<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste-to-Wealth | Circular Economy Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            800: '#292524',
                            900: '#1c1917',
                        },
                        green: {
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brown: {
                            600: '#854d0e',
                            700: '#713f12',
                            800: '#57330e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.1s ease, color 0.1s ease;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a8a29e; }
        
        /* Typography Cursor */
        @keyframes blink { 50% { opacity: 0; } }

        /* Flat Inputs */
        input[type=text], input[type=number], input[type=email], input[type=password], select {
            border: none;
            background-color: transparent;
            padding: 10px 0;
            outline: none;
            border-radius: 0;
            border-bottom: 2px solid currentColor;
            opacity: 0.6;
            width: 100%;
            font-size: 1rem;
            color: inherit;
            transition: opacity 0.2s ease;
        }
        input[type=text]:focus, input[type=number]:focus, input[type=email]:focus, input[type=password]:focus, select:focus {
            opacity: 1;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input::placeholder {
            color: currentColor;
            opacity: 0.5;
        }

        /* Handle Select Dropdowns in Dark/Light mode */
        body.dark-mode select option {
            background-color: #1c1917;
            color: #f5f5f4;
        }
        body:not(.dark-mode) select option {
            background-color: #ffffff;
            color: #1c1917;
        }

        /* Flat Buttons */
        button { border-radius: 0; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Payment Modal Specifics to ensure inputs show correctly on white bg */
        #payment-modal input[type=text], #payment-modal input[type=number] {
            color: #1c1917;
            border-bottom-color: #1c1917;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Navigation -->
    <nav id="main-nav" class="fixed top-0 w-full z-50 border-b transition-colors duration-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="router.navigate('landing')">
                    <i id="nav-icon" class="fa-solid fa-recycle text-2xl mr-3"></i>
                    <span id="nav-brand" class="font-display text-xl font-bold tracking-widest uppercase">Waste <span class="font-light">To</span> Wealth</span>
                </div>
                
                <div id="desktop-nav-links" class="hidden md:flex space-x-8 items-center">
                    <!-- Injected via JS based on auth state -->
                </div>

                <div class="md:hidden">
                    <button id="nav-menu-btn" onclick="toggleMobileMenu()" class="focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden border-b w-full transition-colors duration-100">
            <div id="mobile-menu-links" class="px-6 py-6 space-y-6">
                <!-- Injected via JS based on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="flex-grow pt-32 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full mb-20"></main>

    <!-- Payment Modal (Hidden by default) -->
    <div id="payment-modal" class="hidden fixed inset-0 z-[100] bg-stone-900/90 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white text-stone-900 w-full max-w-md p-10 relative">
            <button onclick="closePaymentModal()" class="absolute top-6 right-6 text-2xl font-bold opacity-50 hover:opacity-100 focus:outline-none">&times;</button>
            <h2 class="text-3xl font-display font-bold mb-1">Checkout</h2>
            <p id="payment-desc" class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-8">Payment Description</p>
            
            <div class="mb-10">
                <p class="text-[10px] font-bold uppercase tracking-widest mb-1 opacity-60">Amount Due</p>
                <h3 id="payment-amount" class="text-4xl font-bold text-green-700">Ksh 0</h3>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-4 opacity-60">Select Payment Method</label>
                    <div class="flex space-x-4 border-b-2 border-stone-200">
                        <button onclick="switchPaymentMethod('mpesa')" id="btn-mpesa" class="flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-green-700 text-green-700 -mb-[2px] transition-colors">M-Pesa</button>
                        <button onclick="switchPaymentMethod('card')" id="btn-card" class="flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-stone-500 hover:text-stone-900 -mb-[2px] transition-colors">Card</button>
                    </div>
                </div>

                <div id="payment-mpesa" class="block space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">M-Pesa Phone Number</label>
                        <input type="text" placeholder="07XX XXX XXX" class="w-full text-lg" value="0712345678">
                        <p class="text-[10px] opacity-60 mt-2 font-bold uppercase tracking-widest">An STK push will be sent to your phone.</p>
                    </div>
                </div>

                <div id="payment-card" class="hidden space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">Card Number</label>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX" class="w-full text-lg">
                    </div>
                    <div class="flex space-x-6">
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">Expiry</label>
                            <input type="text" placeholder="MM/YY" class="w-full text-lg">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">CVV</label>
                            <input type="text" placeholder="123" class="w-full text-lg">
                        </div>
                    </div>
                </div>

                <button onclick="processPayment()" id="btn-pay-action" class="w-full bg-stone-900 text-white font-bold py-4 uppercase tracking-widest text-xs mt-4 hover:bg-green-800 transition-colors">Confirm Payment</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <style id="cursor-style"></style>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'landing',
            currentUserRole: null, // null, 'admin', 'producer', 'processor', 'farmer'
            subViews: {
                admin: 'metrics',
                producer: 'log',
                processor: 'inventory',
                farmer: 'market'
            },
            cart: [],
            deliveryFee: 0,
            deliveryType: 'pickup',
            platformRevenue: {
                pickupCommissions: 12500,
                marketplaceCommissions: 45000,
                trainingFees: 8000
            },
            counties: [
                "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita-Taveta", "Garissa", "Wajir", "Mandera", "Marsabit", 
                "Isiolo", "Meru", "Tharaka-Nithi", "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga", 
                "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia", "Uasin Gishu", "Elgeyo-Marakwet", 
                "Nandi", "Baringo", "Laikipia", "Nakuru", "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", 
                "Bungoma", "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira", "Nairobi"
            ],
            academy: [
                { id: 101, title: 'Basics of Organic Sorting & Segregation', date: 'Sessions coming soon', fee: 1500, icon: 'fa-trash-arrow-up' },
                { id: 102, title: 'Commercial Composting Techniques', date: 'Sessions coming soon', fee: 3500, icon: 'fa-seedling' },
                { id: 103, title: 'Biogas Plant Management & Safety', date: 'Sessions coming soon', fee: 2500, icon: 'fa-fire-flame-simple' }
            ],
            stats: {
                totalWaste: 12500,
                fertilizerProduced: 4500,
                feedSales: 450000,
                co2Saved: 8500
            },
            producer: {
                credits: 1250,
                history: [
                    { id: 1, date: '2026-03-10', type: 'Food Waste', location: 'Nairobi', amount: 50, credits: 25, pickupFee: 1500 },
                    { id: 2, date: '2026-03-12', type: 'Garden Waste', location: 'Kiambu', amount: 100, credits: 30, pickupFee: 2000 }
                ],
                analysisLogs: [
                    { batch: "#QA-2991", date: "Mar 10, 2026", moisture: "62%", contam: "0.4%", grade: "A+", notes: "Excellent quality, high organic content." },
                    { batch: "#QA-2988", date: "Mar 08, 2026", moisture: "58%", contam: "1.2%", grade: "B", notes: "Slight plastic traces found in pre-sort." },
                ]
            },
            adminOrders: [
                { id: "TRK-9021", farmerName: "Sunnyside Farm", details: "2x Premium Organic Compost", total: 3000, status: "Auto-Approved", reason: "Sufficient stock & clear payment" }
            ],
            farmer: {
                orders: [
                    { id: "TRK-9021", name: "Premium Organic Compost", qty: 2, total: 3000, status: "Processing", date: "Mar 14, 2026", estDelivery: "Mar 17, 2026" },
                    { id: "TRK-8802", name: "Nutri-Rich Liquid Fertilizer", qty: 1, total: 2500, status: "Shipped", date: "Mar 12, 2026", estDelivery: "Mar 15, 2026" },
                    { id: "TRK-7540", name: "Balanced Animal Feed", qty: 5, total: 20000, status: "Delivered", date: "Feb 28, 2026", estDelivery: "Delivered" }
                ]
            },
            processor: {
                inventoryList: [
                    { id: 'C-101', type: 'Compost', batch: 'B-299', qty: 500, unit: 'kg', status: 'Ready' },
                    { id: 'C-102', type: 'Compost', batch: 'B-300', qty: 300, unit: 'kg', status: 'Curing' },
                    { id: 'F-201', type: 'Feed', batch: 'F-055', qty: 200, unit: 'kg', status: 'Ready' },
                ],
                intakeLog: [],
                units: [
                    { id: 1, name: 'Digester A (Bio-Gas)', progress: 75, daysLeft: 5 }, 
                    { id: 2, name: 'Composter B (Aerobic)', progress: 45, daysLeft: 12 },
                    { id: 3, name: 'Digester C (Sludge)', progress: 90, daysLeft: 1 } 
                ]
            },
            market: [
                { id: 1, name: 'Premium Organic Compost', price: 1500, unit: '50kg Bag', stock: 100, icon: 'fa-seedling' },
                { id: 2, name: 'Nutri-Rich Liquid Fertilizer', price: 2500, unit: '10L Drum', stock: 50, icon: 'fa-flask' },
                { id: 3, name: 'Balanced Animal Feed', price: 4000, unit: '25kg Bag', stock: 80, icon: 'fa-cow' },
                { id: 4, name: 'Bio-Char Soil Amendment', price: 3000, unit: '10kg Bag', stock: 25, icon: 'fa-fire-burner' }
            ]
        };

        const router = {
            navigate: (view) => {
                // Auth Guard
                if (['admin', 'producer', 'processor', 'farmer'].includes(view)) {
                    if (state.currentUserRole !== view && state.currentUserRole !== 'admin') {
                        showToast(`Access Denied. Please login to access the ${view} dashboard.`, 'error');
                        return router.navigate('login');
                    }
                }
                state.currentView = view;
                render();
                window.scrollTo(0,0);
            },
            setSubView: (role, subView) => {
                state.subViews[role] = subView;
                render();
            }
        };

        // UI THEME CONTROLLER
        function getTheme() {
            const isDark = state.currentView !== 'admin';
            return {
                isDark,
                textPrimary: isDark ? 'text-stone-50' : 'text-stone-900',
                textSecondary: isDark ? 'text-stone-300' : 'text-stone-600',
                accentColor: isDark ? 'text-green-400' : 'text-stone-900',
                borderPrimary: isDark ? 'border-stone-50' : 'border-stone-900',
                borderSecondary: isDark ? 'border-stone-50/20' : 'border-stone-900/20',
                tabActive: isDark ? 'text-green-400 border-green-400' : 'text-stone-900 border-stone-900',
                tabInactive: isDark ? 'text-stone-400 border-transparent' : 'text-stone-500 border-transparent',
                btnClass: isDark ? 'bg-green-600 text-white font-bold py-4 px-8 uppercase tracking-widest text-xs transition-colors hover:bg-green-500' : 'bg-stone-900 text-white font-bold py-4 px-8 uppercase tracking-widest text-xs transition-colors hover:bg-stone-800'
            };
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const t = getTheme();
            
            toast.className = `px-6 py-4 flex items-center min-w-[300px] mb-4 border border-stone-500`;
            toast.style.backgroundColor = t.isDark ? '#ffffff' : '#1c1917';
            toast.style.color = t.isDark ? '#1c1917' : '#ffffff';
            
            const icon = type === 'success' ? 'fa-check' : (type === 'info' ? 'fa-info-circle' : 'fa-exclamation');
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg mr-4"></i>
                <div>
                    <h4 class="font-bold text-xs uppercase tracking-widest">${type}</h4>
                    <p class="text-xs mt-1 opacity-80">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        function formatNum(num) {
            return new Intl.NumberFormat().format(num);
        }

        // --- PAYMENT MODAL LOGIC ---
        let pendingPaymentCallback = null;

        function showPaymentModal(amount, description, callback) {
            pendingPaymentCallback = callback;
            document.getElementById('payment-amount').innerText = `Ksh ${formatNum(amount)}`;
            document.getElementById('payment-desc').innerText = description;
            document.getElementById('btn-pay-action').innerText = `Pay Ksh ${formatNum(amount)}`;
            
            // Reset to Mpesa default visually
            switchPaymentMethod('mpesa');
            
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
            pendingPaymentCallback = null;
        }

        function switchPaymentMethod(method) {
            const btnMpesa = document.getElementById('btn-mpesa');
            const btnCard = document.getElementById('btn-card');
            const viewMpesa = document.getElementById('payment-mpesa');
            const viewCard = document.getElementById('payment-card');

            if(method === 'mpesa') {
                btnMpesa.className = 'flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-green-700 text-green-700 -mb-[2px] transition-colors';
                btnCard.className = 'flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-stone-500 hover:text-stone-900 -mb-[2px] transition-colors';
                viewMpesa.classList.remove('hidden');
                viewCard.classList.add('hidden');
            } else {
                btnCard.className = 'flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-green-700 text-green-700 -mb-[2px] transition-colors';
                btnMpesa.className = 'flex-1 pb-3 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-stone-500 hover:text-stone-900 -mb-[2px] transition-colors';
                viewCard.classList.remove('hidden');
                viewMpesa.classList.add('hidden');
            }
        }

        function processPayment() {
            const btn = document.getElementById('btn-pay-action');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = 'Confirm Payment';
                btn.disabled = false;
                closePaymentModal();
                if(pendingPaymentCallback) pendingPaymentCallback();
            }, 1500);
        }


        // --- AUTH LOGIC ---
        function handleRegister(e) {
            e.preventDefault();
            const role = document.getElementById('regRole').value;
            if(!role) return showToast('Please select a role', 'error');
            
            const tcBox = document.getElementById('tcCheckbox');
            if(!tcBox.checked) return showToast('You must agree to the Terms and Conditions', 'error');

            localStorage.setItem('w2w_user_role', role);
            state.currentUserRole = role;
            showToast(`Registration complete. Welcome to the ${role} dashboard!`, 'success');
            router.navigate(role);
        }

        function toggleTC(e) {
            if(e) e.preventDefault();
            const tcArea = document.getElementById('tcScrollArea');
            if (tcArea.classList.contains('hidden')) {
                tcArea.classList.remove('hidden');
                tcArea.classList.add('flex');
            } else {
                tcArea.classList.add('hidden');
                tcArea.classList.remove('flex');
            }
        }

        function agreeTC() {
            document.getElementById('tcCheckbox').checked = true;
            document.getElementById('tcScrollArea').classList.add('hidden');
            document.getElementById('tcScrollArea').classList.remove('flex');
            showToast('Terms and Conditions accepted.', 'success');
        }

        function handleLogin(e) {
            e.preventDefault();
            const role = localStorage.getItem('w2w_user_role') || 'farmer';
            
            state.currentUserRole = role;
            showToast(`Logged in successfully.`, 'success');
            router.navigate(role);
        }

        function logout() {
            state.currentUserRole = null;
            showToast('Logged out securely.', 'info');
            router.navigate('landing');
        }


        // --- BUSINESS LOGIC ---

        function handleWasteSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('wasteType').value;
            const amount = parseFloat(document.getElementById('wasteAmount').value);
            const location = document.getElementById('wasteLocation').value;
            
            if(!amount || amount <= 0) return showToast('Please select a valid amount', 'error');
            if(!location) return showToast('Please select a location', 'error');

            const basePickupFee = 1000; 
            const weightFee = amount * 10; 
            const totalPickupFee = basePickupFee + weightFee;
            
            // Initiate Payment
            showPaymentModal(totalPickupFee, `Logistics & Processing Fee (${amount}kg)`, () => {
                const platformCommission = totalPickupFee * 0.15;
                state.platformRevenue.pickupCommissions += platformCommission;

                const earnedCredits = Math.floor(amount * 0.5);
                state.producer.credits += earnedCredits;
                state.stats.totalWaste += amount;
                
                state.producer.history.unshift({
                    id: Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    type: type,
                    location: location,
                    amount: amount,
                    credits: earnedCredits,
                    pickupFee: totalPickupFee
                });

                showToast(`Payment successful! Pickup scheduled. Earned ${earnedCredits} PTS.`, 'success');
                render();
            });
        }

        function addToCart(productId) {
            const product = state.market.find(p => p.id === productId);
            const qtyInput = document.getElementById(`qty-${productId}`);
            const qty = parseInt(qtyInput.value) || 1;

            if (qty > product.stock) return showToast('Not enough stock available', 'error');

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty + qty > product.stock) return showToast('Stock limit reached', 'error');
                existing.qty += qty;
            } else {
                state.cart.push({ ...product, qty: qty });
            }
            
            product.stock -= qty; 
            showToast(`Added ${qty} x ${product.name} to cart`);
            render();
        }

        function updateDeliveryFee() {
            const type = document.querySelector('input[name="deliveryType"]:checked').value;
            state.deliveryType = type;
            state.deliveryFee = (type === 'door') ? 1000 : 0;
            render();
        }

        function checkout(e) {
            if(e) e.preventDefault();
            if (state.cart.length === 0) return showToast('Cart is empty', 'error');
            
            const name = document.getElementById('checkoutName').value;
            const location = document.getElementById('checkoutLocation').value;
            
            if(!name || (state.deliveryType === 'door' && !location)) {
                return showToast('Please fill in all delivery details', 'error');
            }

            let orderSubtotal = 0;
            let orderDetailsStr = "";
            state.cart.forEach(item => {
                orderSubtotal += (item.price * item.qty);
                orderDetailsStr += `${item.qty}x ${item.name}, `;
            });

            const total = orderSubtotal + state.deliveryFee;

            // Initiate Payment
            showPaymentModal(total, `Marketplace Order & Shipping`, () => {
                const trackingId = "TRK-" + Math.floor(1000 + Math.random() * 9000);
                const estDate = new Date();
                estDate.setDate(estDate.getDate() + 3);

                state.cart.forEach(item => {
                    const itemTotal = item.price * item.qty;
                    state.farmer.orders.unshift({
                        id: trackingId,
                        name: item.name,
                        qty: item.qty,
                        total: itemTotal,
                        date: new Date().toLocaleDateString(),
                        status: 'Processing',
                        estDelivery: estDate.toLocaleDateString()
                    });
                    state.stats.feedSales += itemTotal;
                });
                
                state.adminOrders.unshift({
                    id: trackingId,
                    farmerName: name,
                    details: orderDetailsStr.slice(0, -2),
                    total: total,
                    status: "Auto-Approved",
                    reason: "Payment secured & stock verified."
                });

                const platformCommission = orderSubtotal * 0.10;
                state.platformRevenue.marketplaceCommissions += platformCommission;

                state.cart = [];
                showToast(`Payment successful! Order Auto-Approved. Tracking ID: ${trackingId}`, 'success');
                router.setSubView('farmer', 'orders');
            });
        }

        function bookTraining(id) {
            const course = state.academy.find(c => c.id === id);
            
            // Initiate Payment
            showPaymentModal(course.fee, `Academy: ${course.title}`, () => {
                state.platformRevenue.trainingFees += course.fee;
                showToast(`Payment received! Confirmation sent via Email, SMS, & WhatsApp.`, 'success');
                render();
            });
        }

        function handleIntakeLog(e) {
            e.preventDefault();
            const source = document.getElementById('intakeSource').value;
            const weight = document.getElementById('intakeWeight').value;

            state.processor.intakeLog.unshift({
                time: new Date().toLocaleTimeString(),
                source: source,
                weight: weight,
                status: 'Logged'
            });

            state.stats.totalWaste += parseFloat(weight);
            showToast(`Logged intake of ${weight}kg`);
            render();
        }

        function updateProductStock(id) {
            const newStock = parseInt(document.getElementById(`stock-edit-${id}`).value);
            const product = state.market.find(p => p.id === id);
            if(product && newStock >= 0) {
                product.stock = newStock;
                showToast(`Stock updated for ${product.name}`);
                render();

        function generateGauge(percentage) {
            const t = getTheme();
            const totalLen = 126;
            const strokeLen = (percentage / 100) * totalLen;
            const trackColor = t.isDark ? 'rgba(255,255,255,0.2)' : 'rgba(28,25,23,0.2)';
            const fillColor = t.isDark ? '#4ade80' : '#1c1917'; // vibrant green or black

            return `
                <svg viewBox="0 0 100 60" class="w-full h-auto">
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${trackColor}" stroke-width="4" stroke-linecap="butt" />
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${fillColor}" stroke-width="4" stroke-linecap="butt" stroke-dasharray="${strokeLen} 1000" />
                    <text x="50" y="45" text-anchor="middle" font-size="14" font-weight="bold" fill="${t.isDark ? '#fafaf9' : '#1c1917'}">${percentage}%</text>
                </svg>
            `;
        }

        function getTrackingUI(order) {
            const t = getTheme();
            let progress = 25;
            let isProcessing = false, isShipped = false, isDelivered = false;
            
            if(order.status === 'Processing' || order.status === 'In Warehouse') { progress = 50; isProcessing = true; }
            else if(order.status === 'Shipped') { progress = 75; isProcessing = true; isShipped = true; }
            else if(order.status === 'Delivered') { progress = 100; isProcessing = true; isShipped = true; isDelivered = true; }

            const trackBg = t.isDark ? 'bg-stone-50/20' : 'bg-stone-900/20';
            const fillBg = t.isDark ? 'bg-green-400' : 'bg-stone-900';
            const activeIcon = t.isDark ? 'text-green-400' : 'text-stone-900';
            const inactiveIcon = t.isDark ? 'text-stone-50/30' : 'text-stone-900/30';

            return `
                <div class="mt-8 mb-6 w-full max-w-2xl">
                    <div class="relative flex items-center justify-between w-full">
                        <div class="absolute left-0 top-3 w-full h-px ${trackBg} z-0"></div>
                        <div class="absolute left-0 top-3 h-px ${fillBg} z-0 transition-all duration-1000" style="width: ${progress}%;"></div>
                        
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-xl ${activeIcon} bg-transparent px-2"><i class="fa-solid fa-check-circle"></i></div>

                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-xl ${isProcessing ? activeIcon : inactiveIcon} bg-transparent px-2"><i class="fa-solid fa-box"></i></div>
                            <span class="text-xs font-bold mt-2 uppercase tracking-widest ${isProcessing ? t.textPrimary : t.textSecondary}">Warehouse</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">

                            <span class="text-xs font-bold mt-2 uppercase tracking-widest ${isShipped ? t.textPrimary : t.textSecondary}">Shipped</span>

                        <a onclick="router.navigate('producer'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">Producer</a>
                        <a onclick="router.navigate('processor'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">Processor</a>
                        <a onclick="router.navigate('farmer'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">Farmer</a>
                        <a onclick="logout(); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-red-500 cursor-pointer mt-6">Logout</a>
                    `;
                } else {
                    desktopNav.innerHTML = `
                        <button onclick="router.navigate('${role}')" class="nav-btn text-xs font-bold uppercase tracking-widest border-b-2 border-transparent ${t.textPrimary}">${role} Dashboard</button>
                        <button onclick="logout()" class="text-xs font-bold uppercase tracking-widest text-red-500 ml-6">Logout</button>
                    `;
                    mobileNav.innerHTML = `
                        <a onclick="router.navigate('${role}'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">${role} Dashboard</a>
                        <a onclick="logout(); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-red-500 cursor-pointer mt-6">Logout</a>
                    `;
                }
            }
        }

        function render() {
            const root = document.getElementById('app-root');
            const body = document.body;
            const nav = document.getElementById('main-nav');
            const menu = document.getElementById('mobile-menu');
            const navBrand = document.getElementById('nav-brand');
            const navIcon = document.getElementById('nav-icon');
            const navMenuBtn = document.getElementById('nav-menu-btn');
            const cursorStyle = document.getElementById('cursor-style');
            
            let bgColor = '#ffffff';
            let isDark = false;

            switch(state.currentView) {
                case 'landing': bgColor = '#14532d'; isDark = true; break; 
                case 'register': bgColor = '#14532d'; isDark = true; break; 
                case 'login': bgColor = '#14532d'; isDark = true; break; 
                case 'admin': bgColor = '#fffde7'; isDark = false; break; 
                case 'producer': bgColor = '#3e2723'; isDark = true; break; 
                case 'processor': bgColor = '#3e2723'; isDark = true; break; 
                case 'farmer': bgColor = '#064e3b'; isDark = true; break; 
            }

            body.style.backgroundColor = bgColor;
            nav.style.backgroundColor = bgColor;
            menu.style.backgroundColor = bgColor;

            if (isDark) {
                body.style.color = '#f5f5f4';
                nav.style.borderColor = 'rgba(255,255,255,0.1)';
                menu.style.borderColor = 'rgba(255,255,255,0.1)';
                navBrand.className = 'font-display text-xl font-bold tracking-widest text-stone-50 uppercase';
                navIcon.className = 'fa-solid fa-recycle text-2xl text-stone-50 mr-3';
                navMenuBtn.className = 'text-stone-50 focus:outline-none';
                cursorStyle.innerHTML = '.cursor::after { color: #f5f5f4; }';
                body.classList.add('dark-mode');
            } else {
                body.style.color = '#1c1917';
                nav.style.borderColor = 'rgba(28,25,23,0.1)';
                menu.style.borderColor = 'rgba(28,25,23,0.1)';
                navBrand.className = 'font-display text-xl font-bold tracking-widest text-stone-900 uppercase';
                navIcon.className = 'fa-solid fa-recycle text-2xl text-stone-900 mr-3';
                navMenuBtn.className = 'text-stone-900 focus:outline-none';
                cursorStyle.innerHTML = '.cursor::after { color: #16a34a; }';
                body.classList.remove('dark-mode');
            }

            renderNav();

            root.innerHTML = ''; 
            switch(state.currentView) {
                case 'landing': root.innerHTML = renderLanding(); initTypewriter(); break;
                case 'register': root.innerHTML = renderRegister(); break;
                case 'login': root.innerHTML = renderLogin(); break;
                case 'admin': root.innerHTML = renderAdmin(); break;
                case 'producer': root.innerHTML = renderProducer(); break;
                case 'farmer': root.innerHTML = renderFarmer(); break;
                case 'processor': root.innerHTML = renderProcessor(); break;
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        let i = 0;
        const text = "Welcome to Waste to Wealth";
        function initTypewriter() {
            const elem = document.getElementById("typewriter");
            if(!elem) return;
            elem.innerHTML = "";
            i = 0;
            typeWriter();
        }

        function typeWriter() {
            const elem = document.getElementById("typewriter");
            if (elem && i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        window.addEventListener('load', () => { render(); });
    </script>
</body>
</html>
