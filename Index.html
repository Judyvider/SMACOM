<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste-to-Wealth | Circular Economy Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            800: '#292524',
                            900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.1s ease, color 0.1s ease;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a8a29e; }
        
        /* Typography Cursor */
        @keyframes blink { 50% { opacity: 0; } }

        /* Flat Inputs */
        input[type=text], input[type=number], input[type=email], input[type=password], select {
            border: none;
            background-color: transparent;
            padding: 12px 0;
            outline: none;
            border-radius: 0;
            border-bottom: 2px solid currentColor;
            opacity: 0.6;
            width: 100%;
            font-size: 1.125rem;
            color: inherit;
            transition: opacity 0.2s ease;
        }
        input[type=text]:focus, input[type=number]:focus, input[type=email]:focus, input[type=password]:focus, select:focus {
            opacity: 1;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input::placeholder {
            color: currentColor;
            opacity: 0.5;
        }

        /* Handle Select Dropdowns in Dark/Light mode */
        body.dark-mode select option {
            background-color: #1c1917;
            color: #f5f5f4;
        }
        body:not(.dark-mode) select option {
            background-color: #ffffff;
            color: #1c1917;
        }

        /* Flat Buttons */
        button { border-radius: 0; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .nav-tab-active {
            border-bottom: 3px solid currentColor;
            font-weight: 700;
        }
        .nav-tab-inactive {
            border-bottom: 3px solid transparent;
            opacity: 0.6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Navigation -->
    <nav id="main-nav" class="fixed top-0 w-full z-50 border-b transition-colors duration-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-24">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="router.navigate('landing')">
                    <i id="nav-icon" class="fa-solid fa-recycle text-3xl mr-4"></i>
                    <span id="nav-brand" class="font-display text-2xl font-bold tracking-widest uppercase">Waste <span class="font-light">To</span> Wealth</span>
                </div>
                
                <div id="desktop-nav-links" class="hidden md:flex space-x-10 items-center">
                    <!-- Injected via JS based on auth state -->
                </div>

                <div class="md:hidden">
                    <button id="nav-menu-btn" onclick="toggleMobileMenu()" class="focus:outline-none">
                        <i class="fa-solid fa-bars text-3xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden border-b w-full transition-colors duration-100">
            <div id="mobile-menu-links" class="px-6 py-6 space-y-6">
                <!-- Injected via JS based on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="flex-grow pt-40 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full mb-32"></main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <style id="cursor-style"></style>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'landing',
            currentUserRole: null, // null, 'admin', 'producer', 'processor', 'farmer'
            subViews: {
                admin: 'metrics',
                producer: 'log',
                processor: 'inventory',
                farmer: 'market'
            },
            cart: [],
            deliveryFee: 0,
            deliveryType: 'pickup',
            platformRevenue: {
                pickupCommissions: 12500,
                marketplaceCommissions: 45000,
                trainingFees: 8000
            },
            counties: [
                "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita-Taveta", "Garissa", "Wajir", "Mandera", "Marsabit", 
                "Isiolo", "Meru", "Tharaka-Nithi", "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga", 
                "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia", "Uasin Gishu", "Elgeyo-Marakwet", 
                "Nandi", "Baringo", "Laikipia", "Nakuru", "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", 
                "Bungoma", "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira", "Nairobi"
            ],
            academy: [
                { id: 101, title: 'Basics of Organic Sorting & Segregation', date: 'Sessions coming soon', fee: 1500, icon: 'fa-trash-arrow-up' },
                { id: 102, title: 'Commercial Composting Techniques', date: 'Sessions coming soon', fee: 3500, icon: 'fa-seedling' },
                { id: 103, title: 'Biogas Plant Management & Safety', date: 'Sessions coming soon', fee: 2500, icon: 'fa-fire-flame-simple' }
            ],
            stats: {
                totalWaste: 12500,
                fertilizerProduced: 4500,
                feedSales: 450000,
                co2Saved: 8500
            },
            producer: {
                credits: 1250,
                history: [
                    { id: 1, date: '2026-03-10', type: 'Food Waste', location: 'Nairobi', amount: 50, credits: 25, pickupFee: 1500 },
                    { id: 2, date: '2026-03-12', type: 'Garden Waste', location: 'Kiambu', amount: 100, credits: 30, pickupFee: 2000 }
                ],
                analysisLogs: [
                    { batch: "#QA-2991", date: "Mar 10, 2026", moisture: "62%", contam: "0.4%", grade: "A+", notes: "Excellent quality, high organic content." },
                    { batch: "#QA-2988", date: "Mar 08, 2026", moisture: "58%", contam: "1.2%", grade: "B", notes: "Slight plastic traces found in pre-sort." },
                ]
            },
            adminOrders: [
                { id: "TRK-9021", farmerName: "Sunnyside Farm", details: "2x Premium Organic Compost", total: 3000, status: "Auto-Approved", reason: "Sufficient stock & clear payment" }
            ],
            farmer: {
                orders: [
                    { id: "TRK-9021", name: "Premium Organic Compost", qty: 2, total: 3000, status: "Processing", date: "Mar 14, 2026", estDelivery: "Mar 17, 2026" },
                    { id: "TRK-8802", name: "Nutri-Rich Liquid Fertilizer", qty: 1, total: 2500, status: "Shipped", date: "Mar 12, 2026", estDelivery: "Mar 15, 2026" },
                    { id: "TRK-7540", name: "Balanced Animal Feed", qty: 5, total: 20000, status: "Delivered", date: "Feb 28, 2026", estDelivery: "Delivered" }
                ]
            },
            processor: {
                inventoryList: [
                    { id: 'C-101', type: 'Compost', batch: 'B-299', qty: 500, unit: 'kg', status: 'Ready' },
                    { id: 'C-102', type: 'Compost', batch: 'B-300', qty: 300, unit: 'kg', status: 'Curing' },
                    { id: 'F-201', type: 'Feed', batch: 'F-055', qty: 200, unit: 'kg', status: 'Ready' },
                ],
                intakeLog: [],
                units: [
                    { id: 1, name: 'Digester A (Bio-Gas)', progress: 75, daysLeft: 5 }, 
                    { id: 2, name: 'Composter B (Aerobic)', progress: 45, daysLeft: 12 },
                    { id: 3, name: 'Digester C (Sludge)', progress: 90, daysLeft: 1 } 
                ]
            },
            market: [
                { id: 1, name: 'Premium Organic Compost', price: 1500, unit: '50kg Bag', stock: 100, icon: 'fa-seedling' },
                { id: 2, name: 'Nutri-Rich Liquid Fertilizer', price: 2500, unit: '10L Drum', stock: 50, icon: 'fa-flask' },
                { id: 3, name: 'Balanced Animal Feed', price: 4000, unit: '25kg Bag', stock: 80, icon: 'fa-cow' },
                { id: 4, name: 'Bio-Char Soil Amendment', price: 3000, unit: '10kg Bag', stock: 25, icon: 'fa-fire-burner' }
            ]
        };

        const router = {
            navigate: (view) => {
                // Auth Guard
                if (['admin', 'producer', 'processor', 'farmer'].includes(view)) {
                    if (state.currentUserRole !== view) {
                        showToast(`Access Denied. Please login to access the ${view} dashboard.`, 'error');
                        return router.navigate('login');
                    }
                }
                state.currentView = view;
                render();
                window.scrollTo(0,0);
            },
            setSubView: (role, subView) => {
                state.subViews[role] = subView;
                render();
            }
        };

        // UI THEME CONTROLLER
        function getTheme() {
            const isDark = state.currentView !== 'admin';
            return {
                isDark,
                textPrimary: isDark ? 'text-stone-50' : 'text-stone-900',
                textSecondary: isDark ? 'text-stone-300' : 'text-stone-600',
                borderPrimary: isDark ? 'border-stone-50' : 'border-stone-900',
                borderSecondary: isDark ? 'border-stone-50/20' : 'border-stone-900/20',
                tabActive: isDark ? 'text-stone-50 border-stone-50' : 'text-stone-900 border-stone-900',
                tabInactive: isDark ? 'text-stone-400 border-transparent' : 'text-stone-500 border-transparent',
                btnClass: isDark ? 'bg-stone-50 text-stone-900 font-bold py-4 px-8 uppercase tracking-widest text-sm' : 'bg-stone-900 text-white font-bold py-4 px-8 uppercase tracking-widest text-sm'
            };
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const t = getTheme();
            
            toast.className = `px-6 py-4 flex items-center min-w-[300px] mb-4 border border-stone-500`;
            toast.style.backgroundColor = t.isDark ? '#ffffff' : '#1c1917';
            toast.style.color = t.isDark ? '#1c1917' : '#ffffff';
            
            const icon = type === 'success' ? 'fa-check' : (type === 'info' ? 'fa-info-circle' : 'fa-exclamation');
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-xl mr-4"></i>
                <div>
                    <h4 class="font-bold text-sm uppercase tracking-widest">${type}</h4>
                    <p class="text-sm mt-1 opacity-80">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        function formatNum(num) {
            return new Intl.NumberFormat().format(num);
        }

        // --- AUTH LOGIC ---
        function handleRegister(e) {
            e.preventDefault();
            const role = document.getElementById('regRole').value;
            if(!role) return showToast('Please select a role', 'error');
            
            state.currentUserRole = role;
            showToast(`Registration complete. Welcome to the ${role} dashboard!`, 'success');
            router.navigate(role);
        }

        function handleLogin(e) {
            e.preventDefault();
            const role = document.getElementById('loginRole').value;
            if(!role) return showToast('Please select a role to login', 'error');
            
            state.currentUserRole = role;
            showToast(`Logged in successfully as ${role}.`, 'success');
            router.navigate(role);
        }

        function logout() {
            state.currentUserRole = null;
            showToast('Logged out securely.', 'info');
            router.navigate('landing');
        }


        // --- BUSINESS LOGIC ---

        function handleWasteSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('wasteType').value;
            const amount = parseFloat(document.getElementById('wasteAmount').value);
            const location = document.getElementById('wasteLocation').value;
            
            if(!amount || amount <= 0) return showToast('Please select a valid amount', 'error');
            if(!location) return showToast('Please select a location', 'error');

            const basePickupFee = 1000; 
            const weightFee = amount * 10; 
            const totalPickupFee = basePickupFee + weightFee;
            
            const platformCommission = totalPickupFee * 0.15;
            state.platformRevenue.pickupCommissions += platformCommission;

            const earnedCredits = Math.floor(amount * 0.5);
            state.producer.credits += earnedCredits;
            state.stats.totalWaste += amount;
            
            state.producer.history.unshift({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                type: type,
                location: location,
                amount: amount,
                credits: earnedCredits,
                pickupFee: totalPickupFee
            });

            showToast(`Payment mechanism initiated.`, 'info');
            setTimeout(() => {
                showToast(`Payment received. Pickup scheduled successfully! Earned ${earnedCredits} PTS.`);
                render();
            }, 2000);
        }

        function addToCart(productId) {
            const product = state.market.find(p => p.id === productId);
            const qtyInput = document.getElementById(`qty-${productId}`);
            const qty = parseInt(qtyInput.value) || 1;

            if (qty > product.stock) return showToast('Not enough stock available', 'error');

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty + qty > product.stock) return showToast('Stock limit reached', 'error');
                existing.qty += qty;
            } else {
                state.cart.push({ ...product, qty: qty });
            }
            
            product.stock -= qty; 
            showToast(`Added ${qty} x ${product.name} to cart`);
            render();
        }

        function updateDeliveryFee() {
            const type = document.querySelector('input[name="deliveryType"]:checked').value;
            state.deliveryType = type;
            state.deliveryFee = (type === 'door') ? 1000 : 0;
            render();
        }

        function checkout(e) {
            if(e) e.preventDefault();
            if (state.cart.length === 0) return showToast('Cart is empty', 'error');
            
            const name = document.getElementById('checkoutName').value;
            const location = document.getElementById('checkoutLocation').value;
            
            if(!name || (state.deliveryType === 'door' && !location)) {
                return showToast('Please fill in all delivery details', 'error');
            }

            const trackingId = "TRK-" + Math.floor(1000 + Math.random() * 9000);
            let orderSubtotal = 0;
            let orderDetailsStr = "";

            const estDate = new Date();
            estDate.setDate(estDate.getDate() + 3);

            state.cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                orderSubtotal += itemTotal;
                orderDetailsStr += `${item.qty}x ${item.name}, `;
                
                state.farmer.orders.unshift({
                    id: trackingId,
                    name: item.name,
                    qty: item.qty,
                    total: itemTotal,
                    date: new Date().toLocaleDateString(),
                    status: 'Processing',
                    estDelivery: estDate.toLocaleDateString()
                });
                state.stats.feedSales += itemTotal;
            });
            
            state.adminOrders.unshift({
                id: trackingId,
                farmerName: name,
                details: orderDetailsStr.slice(0, -2),
                total: orderSubtotal,
                status: "Auto-Approved",
                reason: "System verified stock availability."
            });

            const platformCommission = orderSubtotal * 0.10;
            state.platformRevenue.marketplaceCommissions += platformCommission;

            state.cart = [];
            showToast(`Payment successful! Order Auto-Approved. Tracking ID: ${trackingId}`);
            router.setSubView('farmer', 'orders');
        }

        function bookTraining(id) {
            const course = state.academy.find(c => c.id === id);
            showToast('Initiating payment method...', 'info');
            setTimeout(() => {
                state.platformRevenue.trainingFees += course.fee;
                showToast(`Payment received! Confirmation sent via Email, SMS, & WhatsApp.`, 'success');
                render();
            }, 2500);
        }

        function handleIntakeLog(e) {
            e.preventDefault();
            const source = document.getElementById('intakeSource').value;
            const weight = document.getElementById('intakeWeight').value;

            state.processor.intakeLog.unshift({
                time: new Date().toLocaleTimeString(),
                source: source,
                weight: weight,
                status: 'Logged'
            });

            state.stats.totalWaste += parseFloat(weight);
            showToast(`Logged intake of ${weight}kg`);
            render();
        }

        function updateProductStock(id) {
            const newStock = parseInt(document.getElementById(`stock-edit-${id}`).value);
            const product = state.market.find(p => p.id === id);
            if(product && newStock >= 0) {
                product.stock = newStock;
                showToast(`Stock updated for ${product.name}`);
                render();
            }
        }

        function generateGauge(percentage) {
            const t = getTheme();
            const totalLen = 126;
            const strokeLen = (percentage / 100) * totalLen;
            const trackColor = t.isDark ? 'rgba(255,255,255,0.2)' : 'rgba(28,25,23,0.2)';
            const fillColor = t.isDark ? '#ffffff' : '#1c1917';

            return `
                <svg viewBox="0 0 100 60" class="w-full h-auto">
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${trackColor}" stroke-width="4" stroke-linecap="butt" />
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${fillColor}" stroke-width="4" stroke-linecap="butt" stroke-dasharray="${strokeLen} 1000" />
                    <text x="50" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="${fillColor}">${percentage}%</text>
                </svg>
            `;
        }

        function getTrackingUI(order) {
            const t = getTheme();
            let progress = 25;
            let isProcessing = false, isShipped = false, isDelivered = false;
            
            if(order.status === 'Processing' || order.status === 'In Warehouse') { progress = 50; isProcessing = true; }
            else if(order.status === 'Shipped') { progress = 75; isProcessing = true; isShipped = true; }
            else if(order.status === 'Delivered') { progress = 100; isProcessing = true; isShipped = true; isDelivered = true; }

            const trackBg = t.isDark ? 'bg-stone-50/20' : 'bg-stone-900/20';
            const fillBg = t.isDark ? 'bg-stone-50' : 'bg-stone-900';
            const activeIcon = t.isDark ? 'text-stone-50' : 'text-stone-900';
            const inactiveIcon = t.isDark ? 'text-stone-50/30' : 'text-stone-900/30';

            return `
                <div class="mt-12 mb-8 w-full max-w-3xl">
                    <div class="relative flex items-center justify-between w-full">
                        <div class="absolute left-0 top-4 w-full h-px ${trackBg} z-0"></div>
                        <div class="absolute left-0 top-4 h-px ${fillBg} z-0" style="width: ${progress}%;"></div>
                        
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${activeIcon} bg-transparent px-2"><i class="fa-solid fa-check-circle"></i></div>
                            <span class="text-xs font-bold mt-4 uppercase tracking-widest ${t.textPrimary}">Placed</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isProcessing ? activeIcon : inactiveIcon} bg-transparent px-2"><i class="fa-solid fa-box"></i></div>
                            <span class="text-xs font-bold mt-4 uppercase tracking-widest ${isProcessing ? t.textPrimary : t.textSecondary}">Warehouse</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isShipped ? activeIcon : inactiveIcon} bg-transparent px-2"><i class="fa-solid fa-truck"></i></div>
                            <span class="text-xs font-bold mt-4 uppercase tracking-widest ${isShipped ? t.textPrimary : t.textSecondary}">Shipped</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isDelivered ? activeIcon : inactiveIcon} bg-transparent px-2"><i class="fa-solid fa-flag-checkered"></i></div>
                            <span class="text-xs font-bold mt-4 uppercase tracking-widest ${isDelivered ? t.textPrimary : t.textSecondary}">Delivered</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- VIEWS ---

        function renderLanding() {
            const t = getTheme();
            return `
                <div class="flex flex-col items-center justify-center min-h-[60vh] py-12 max-w-4xl mx-auto text-center">
                    <div class="space-y-6">
                        <span class="${t.textPrimary} text-xs font-bold tracking-widest uppercase border-b-2 ${t.borderPrimary} pb-2">Circular Economy V1.0</span>
                        <h1 class="text-6xl md:text-8xl font-display font-bold ${t.textPrimary} leading-tight mt-8">
                            <span id="typewriter" class="${t.textPrimary} cursor"></span>
                        </h1>
                        <p class="${t.textSecondary} text-xl md:text-2xl pt-8 leading-relaxed">
                            A completely decentralized platform connecting producers, farmers, and processors to transform organic waste into valuable resources.
                        </p>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-16 w-full mt-24 border-t-2 border-b-2 ${t.borderSecondary} py-16">
                        <div>
                            <div class="${t.textPrimary} text-4xl mb-4"><i class="fa-solid fa-chart-pie"></i></div>
                            <h3 class="${t.textPrimary} font-bold text-2xl uppercase tracking-widest mb-3">Admin</h3>
                            <p class="text-base ${t.textSecondary}">Oversee ecosystem & financials.</p>
                        </div>
                        <div>
                            <div class="${t.textPrimary} text-4xl mb-4"><i class="fa-solid fa-leaf"></i></div>
                            <h3 class="${t.textPrimary} font-bold text-2xl uppercase tracking-widest mb-3">Producer</h3>
                            <p class="text-base ${t.textSecondary}">Log waste, track quality & learn.</p>
                        </div>
                        <div>
                            <div class="${t.textPrimary} text-4xl mb-4"><i class="fa-solid fa-gears"></i></div>
                            <h3 class="${t.textPrimary} font-bold text-2xl uppercase tracking-widest mb-3">Processor</h3>
                            <p class="text-base ${t.textSecondary}">Manage operations & products.</p>
                        </div>
                        <div>
                            <div class="${t.textPrimary} text-4xl mb-4"><i class="fa-solid fa-basket-shopping"></i></div>
                            <h3 class="${t.textPrimary} font-bold text-2xl uppercase tracking-widest mb-3">Farmer</h3>
                            <p class="text-base ${t.textSecondary}">Buy products, track orders.</p>
                        </div>
                    </div>

                    <div class="mt-16 flex flex-col sm:flex-row gap-6">
                        <button onclick="router.navigate('register')" class="${t.textPrimary} border-2 ${t.borderPrimary} px-12 py-5 font-bold uppercase tracking-widest text-sm transition-colors">Register Account</button>
                        <button onclick="router.navigate('login')" class="${t.textPrimary} border-2 border-transparent px-12 py-5 font-bold uppercase tracking-widest text-sm hover:${t.borderPrimary} transition-colors">Login</button>
                    </div>
                </div>
            `;
        }

        function renderRegister() {
            const t = getTheme();
            return `
                <div class="max-w-3xl mx-auto py-12">
                    <div class="text-center mb-16">
                        <h2 class="text-6xl font-display font-bold ${t.textPrimary} mb-4">Create Account</h2>
                        <p class="${t.textSecondary} text-xl">Join the circular economy network.</p>
                    </div>
                    <form onsubmit="handleRegister(event)" class="space-y-12">

                        </div>` : ''}

                    ${activeTab === 'intake' ? `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-24">
                            <div>
                                <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-12">Log New Intake Batch</h3>
                                <form onsubmit="handleIntakeLog(event)" class="space-y-10">
                                    <div>
                                        <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-4">Source ID</label>
                                        <input type="text" id="intakeSource" required>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-4">Net Weight (kg)</label>
                                        <input type="number" id="intakeWeight" required>
                                    </div>
                                    <div class="pt-8">
                                        <button type="submit" class="${t.btnClass} w-full">Confirm Intake</button>
                                    </div>
                                </form>
                            </div>
                            <div class="pl-0 lg:pl-16 lg:border-l-2 ${t.borderSecondary}">
                                <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-12">Daily Intake History</h3>
                                <div class="space-y-8">
                                    ${state.processor.intakeLog.length === 0 ? `<p class="${t.textSecondary} italic text-lg">No logs today.</p>` : ''}
                                    ${state.processor.intakeLog.map(log => `
                                        <div class="flex justify-between items-center pb-8 border-b-2 ${t.borderSecondary}">
                                            <div>
                                                <p class="${t.textPrimary} font-bold text-2xl mb-2">${log.source}</p>
                                                <p class="text-sm ${t.textSecondary} uppercase tracking-widest">${log.time}</p>
                                            </div>
                                            <p class="text-4xl font-display font-bold ${t.textPrimary}">${log.weight}<span class="text-xl opacity-50">kg</span></p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>` : ''}
                </div>
            `;
        }

        function renderAcademy() {
            const t = getTheme();
            return `
                <div>
                    <div class="mb-20 max-w-4xl">
                        <h3 class="text-6xl font-display font-bold ${t.textPrimary} mb-8">W2W Training Academy</h3>
                        <p class="${t.textSecondary} text-2xl leading-relaxed">Upgrade your skills. Book a professional training session and learn best practices in circular waste management and advanced agricultural techniques.</p>
                    </div>
                    <div class="space-y-16">
                        ${state.academy.map(course => `
                            <div class="pb-16 border-b-2 ${t.borderSecondary} flex flex-col md:flex-row justify-between md:items-start">
                                <div class="flex space-x-10 items-start">
                                    <div class="${t.textPrimary} text-5xl w-16 text-center mt-2"><i class="fa-solid ${course.icon}"></i></div>
                                    <div>
                                        <h4 class="${t.textPrimary} font-bold text-4xl mb-4 leading-tight">${course.title}</h4>
                                        <p class="${t.textSecondary} text-sm font-bold uppercase tracking-widest"><i class="fa-regular fa-calendar mr-4"></i>${course.date}</p>
                                    </div>
                                </div>
                                <div class="mt-10 md:mt-0 flex flex-col items-start md:items-end">
                                    <span class="text-4xl font-bold ${t.textPrimary} mb-8">Ksh ${formatNum(course.fee)}</span>
                                    <button onclick="bookTraining(${course.id})" class="${t.btnClass}">Book Now</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFarmer() {
            const t = getTheme();
            const activeTab = state.subViews.farmer;
            const getTabClass = (tab) => activeTab === tab ? t.tabActive : t.tabInactive;
            const cartCount = state.cart.reduce((sum, item) => sum + item.qty, 0);
            const subtotal = state.cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            const total = subtotal + state.deliveryFee;

            return `
                <div class="space-y-16">
                    <div class="border-b-2 ${t.borderSecondary} pb-8 flex flex-col md:flex-row justify-between items-end">
                        <div class="w-full">
                            <h2 class="text-6xl font-display font-bold ${t.textPrimary} mb-10">Farmer Dashboard</h2>
                            <div class="flex space-x-12 overflow-x-auto w-full">
                                <button onclick="router.setSubView('farmer', 'market')" class="pb-4 text-sm font-bold uppercase tracking-widest whitespace-nowrap border-b-2 ${getTabClass('market')}">Marketplace</button>
                                <button onclick="router.setSubView('farmer', 'orders')" class="pb-4 text-sm font-bold uppercase tracking-widest whitespace-nowrap border-b-2 ${getTabClass('orders')}">Orders & Tracking</button>
                                <button onclick="router.setSubView('farmer', 'academy')" class="pb-4 text-sm font-bold uppercase tracking-widest whitespace-nowrap border-b-2 ${getTabClass('academy')}">Academy</button>
                            </div>
                        </div>
                        <button onclick="router.setSubView('farmer', 'cart')" class="mt-8 md:mt-0 pb-4 flex items-center ${t.textPrimary} border-b-2 border-transparent">
                            <i class="fa-solid fa-cart-shopping mr-4 text-2xl"></i>
                            <span class="font-bold text-base uppercase tracking-widest">Cart (${cartCount})</span>
                        </button>
                    </div>

                    ${activeTab === 'market' ? `
                        <div>
                            <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-12">Agricultural Marketplace</h3>
                            <div class="space-y-20">
                                ${state.market.map(product => `
                                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center pb-16 border-b-2 ${t.borderSecondary}">
                                        <div class="flex space-x-10 items-center mb-10 md:mb-0">
                                            <div class="text-6xl ${t.textPrimary} w-24 text-center"><i class="fa-solid ${product.icon}"></i></div>
                                            <div>
                                                <h3 class="${t.textPrimary} font-bold text-4xl mb-4">${product.name}</h3>
                                                <p class="${t.textSecondary} text-sm uppercase tracking-widest font-bold mb-6">${product.unit} <span class="mx-4 opacity-50">|</span> <span class="${t.textPrimary}">Stock: ${product.stock}</span></p>
                                                <span class="text-3xl font-bold ${t.textPrimary}">Ksh ${formatNum(product.price)}</span>
                                            </div>
                                        </div>
                                        <div class="flex items-end space-x-10">
                                            <div>
                                                <label class="block text-[10px] ${t.textSecondary} uppercase font-bold tracking-widest mb-2">Qty</label>
                                                <input type="number" id="qty-${product.id}" value="1" min="1" max="${product.stock}" class="w-24 text-center text-2xl font-bold">
                                            </div>
                                            <button onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''} class="${t.btnClass}">
                                                ${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>` : ''}

                    ${activeTab === 'cart' ? `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-24">
                            <div class="space-y-16">
                                <div>
                                    <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-10">Your Shopping Cart</h3>
                                    ${state.cart.length === 0 ? `<p class="${t.textSecondary} text-xl italic">Your cart is empty.</p>` : `
                                        <div class="space-y-10">
                                            ${state.cart.map(item => `
                                                <div class="flex justify-between items-center pb-8 border-b-2 ${t.borderSecondary}">
                                                    <div>
                                                        <h4 class="${t.textPrimary} font-bold text-2xl mb-2">${item.name}</h4>
                                                        <p class="${t.textSecondary} text-lg">${item.qty} x Ksh ${formatNum(item.price)}</p>
                                                    </div>
                                                    <p class="${t.textPrimary} font-bold text-3xl">Ksh ${formatNum(item.qty * item.price)}</p>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                                
                                ${state.cart.length > 0 ? `
                                    <div class="pt-10 border-t-2 ${t.borderSecondary}">
                                        <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-10">Shipping Details</h3>
                                        <form id="checkoutForm" class="space-y-10">
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                <div>
                                                    <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-4">Full Name</label>
                                                    <input type="text" id="checkoutName" required>
                                                </div>
                                                <div>
                                                    <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-4">Phone Number</label>
                                                    <input type="text" id="checkoutPhone" required>
                                                </div>
                                            </div>
                                            <div class="pt-6 border-t-2 ${t.borderSecondary}">
                                                <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-8">Delivery Method</label>
                                                <div class="flex flex-col space-y-8">
                                                    <label class="flex items-center space-x-6 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="pickup" checked onchange="updateDeliveryFee()" class="w-6 h-6 border-stone-900">
                                                        <span class="${t.textPrimary} text-xl font-bold">Pick-up Point (Free)</span>
                                                    </label>
                                                    <label class="flex items-center space-x-6 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="door" onchange="updateDeliveryFee()" class="w-6 h-6 border-stone-900">
                                                        <span class="${t.textPrimary} text-xl font-bold">Door Delivery (+Ksh 1,000)</span>
                                                    </label>
                                                </div>
                                            </div>
                                            <div id="locationField" class="pt-6 border-t-2 ${t.borderSecondary}">
                                                <label class="block text-[10px] font-bold ${t.textSecondary} uppercase tracking-widest mb-4">Delivery Location / Pick-up Station</label>
                                                <input type="text" id="checkoutLocation">
                                            </div>
                                        </form>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="pl-0 lg:pl-20 lg:border-l-2 ${t.borderSecondary}">
                                <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-10">Order Summary</h3>
                                <div class="space-y-8 text-xl mb-16">
                                    <div class="flex justify-between ${t.textSecondary}"><span>Subtotal</span><span>Ksh ${formatNum(subtotal)}</span></div>
                                    <div class="flex justify-between ${t.textSecondary}"><span>Delivery Fee</span><span>Ksh ${formatNum(state.deliveryFee)}</span></div>
                                    <div class="flex justify-between ${t.textPrimary} font-bold text-4xl pt-10 border-t-2 ${t.borderSecondary} mt-10">
                                        <span>Total</span><span>Ksh ${formatNum(total)}</span>
                                    </div>
                                </div>
                                <div class="space-y-8">
                                    <button onclick="checkout(event)" class="${t.btnClass} w-full py-6 text-base">Pay & Checkout</button>
                                    <button onclick="router.setSubView('farmer', 'market')" class="w-full ${t.textSecondary} font-bold uppercase tracking-widest text-sm text-center py-4 border-2 ${t.borderSecondary}">Continue Shopping</button>
                                </div>
                            </div>
                        </div>` : ''}

                    ${activeTab === 'orders' ? `
                        <div>
                            <h3 class="text-xs font-bold ${t.textSecondary} uppercase tracking-widest mb-12">Your Orders & Deliveries</h3>
                            <div class="space-y-20">
                                ${state.farmer.orders.map(o => `
                                    <div class="pb-16 border-b-2 ${t.borderSecondary}">
                                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12">
                                            <div>
                                                <h4 class="${t.textPrimary} font-bold text-4xl mb-4">${o.name}</h4>
                                                <p class="text-sm ${t.textSecondary} uppercase tracking-widest">ID: <span class="font-bold ${t.textPrimary}">${o.id}</span> <span class="mx-4 opacity-50">|</span> Placed: ${o.date}</p>
                                            </div>
                                            <div class="mt-8 md:mt-0 text-left md:text-right">
                                                <p class="${t.textPrimary} font-bold text-3xl mb-2">Ksh ${formatNum(o.total || 0)}</p>
                                                <p class="${t.textSecondary} text-lg">Qty: ${o.qty || 1}</p>
                                            </div>
                                        </div>
                                        
                                        ${getTrackingUI(o)}
                                        
                                        <div class="mt-16 pt-10 border-t-2 ${t.borderSecondary} flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <p class="text-sm font-bold ${t.textSecondary} uppercase tracking-widest mb-4 md:mb-0">Status: <span class="${t.textPrimary} text-base ml-4">${o.status}</span></p>
                                            ${o.status !== 'Delivered' ? `<p class="text-sm ${t.textSecondary} uppercase tracking-widest">Est. Delivery: <span class="font-bold ${t.textPrimary} ml-4 text-base">${o.estDelivery}</span></p>` : `<p class="text-sm ${t.textPrimary} font-bold uppercase tracking-widest"><i class="fa-solid fa-check mr-3"></i>Order Complete</p>`}
                                        </div>
                                    </div>
                                `).join('')}
                                ${state.farmer.orders.length === 0 ? `<p class="${t.textSecondary} text-xl italic">No orders yet.</p>` : ''}
                            </div>
                        </div>` : ''}

                    ${activeTab === 'academy' ? renderAcademy() : ''}
                </div>
            `;
        }

        function renderNav() {
            const desktopNav = document.getElementById('desktop-nav-links');
            const mobileNav = document.getElementById('mobile-menu-links');
            const t = getTheme();

            if (!state.currentUserRole) {
                // Not logged in
                desktopNav.innerHTML = `
                    <button onclick="router.navigate('register')" class="text-sm font-bold uppercase tracking-widest ${t.textSecondary} hover:${t.textPrimary} transition-colors">Register</button>
                    <button onclick="router.navigate('login')" class="text-sm font-bold uppercase tracking-widest ${t.textSecondary} hover:${t.textPrimary} transition-colors">Login</button>
                `;
                mobileNav.innerHTML = `
                    <a onclick="router.navigate('register'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">Register</a>
                    <a onclick="router.navigate('login'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">Login</a>
                `;
            } else {
                // Logged in
                const role = state.currentUserRole;
                desktopNav.innerHTML = `
                    <button onclick="router.navigate('${role}')" class="text-sm font-bold uppercase tracking-widest border-b-2 ${state.currentView === role ? t.borderPrimary + ' ' + t.textPrimary : 'border-transparent ' + t.textSecondary}">${role} Dashboard</button>
                    <button onclick="logout()" class="text-sm font-bold uppercase tracking-widest text-red-500 hover:text-red-400 ml-8">Logout</button>
                `;
                mobileNav.innerHTML = `
                    <a onclick="router.navigate('${role}'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest ${t.textPrimary} cursor-pointer">${role} Dashboard</a>
                    <a onclick="logout(); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest text-red-500 cursor-pointer mt-8">Logout</a>
                `;
            }
        }

        function render() {
            const root = document.getElementById('app-root');
            const body = document.body;
            const nav = document.getElementById('main-nav');
            const menu = document.getElementById('mobile-menu');
            const navBrand = document.getElementById('nav-brand');
            const navIcon = document.getElementById('nav-icon');
            const navMenuBtn = document.getElementById('nav-menu-btn');
            const cursorStyle = document.getElementById('cursor-style');
            
            let bgColor = '#ffffff';
            let isDark = false;

            switch(state.currentView) {
                case 'landing': bgColor = '#14532d'; isDark = true; break; 
                case 'register': bgColor = '#14532d'; isDark = true; break; 
                case 'login': bgColor = '#14532d'; isDark = true; break; 
                case 'admin': bgColor = '#fffde7'; isDark = false; break; 
                case 'producer': bgColor = '#3e2723'; isDark = true; break; 
                case 'processor': bgColor = '#3e2723'; isDark = true; break; 
                case 'farmer': bgColor = '#064e3b'; isDark = true; break; 
            }

            body.style.backgroundColor = bgColor;
            nav.style.backgroundColor = bgColor;
            menu.style.backgroundColor = bgColor;

            if (isDark) {
                body.style.color = '#f5f5f4';
                nav.style.borderColor = 'rgba(255,255,255,0.1)';
                menu.style.borderColor = 'rgba(255,255,255,0.1)';
                navBrand.className = 'font-display text-2xl font-bold tracking-widest text-stone-50 uppercase';
                navIcon.className = 'fa-solid fa-recycle text-3xl text-stone-50 mr-4';
                navMenuBtn.className = 'text-stone-50 focus:outline-none';
                cursorStyle.innerHTML = '.cursor::after { color: #f5f5f4; }';
                body.classList.add('dark-mode');
            } else {
                body.style.color = '#1c1917';
                nav.style.borderColor = 'rgba(28,25,23,0.1)';
                menu.style.borderColor = 'rgba(28,25,23,0.1)';
                navBrand.className = 'font-display text-2xl font-bold tracking-widest text-stone-900 uppercase';
                navIcon.className = 'fa-solid fa-recycle text-3xl text-stone-900 mr-4';
                navMenuBtn.className = 'text-stone-900 focus:outline-none';
                cursorStyle.innerHTML = '.cursor::after { color: #16a34a; }';
                body.classList.remove('dark-mode');
            }

            // Always render nav dynamically based on auth
            renderNav();

            root.innerHTML = ''; 
            switch(state.currentView) {
                case 'landing': root.innerHTML = renderLanding(); initTypewriter(); break;
                case 'register': root.innerHTML = renderRegister(); break;
                case 'login': root.innerHTML = renderLogin(); break;
                case 'admin': root.innerHTML = renderAdmin(); break;
                case 'producer': root.innerHTML = renderProducer(); break;
                case 'farmer': root.innerHTML = renderFarmer(); break;
                case 'processor': root.innerHTML = renderProcessor(); break;
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        let i = 0;
        const text = "Welcome to Waste to Wealth";
        function initTypewriter() {
            const elem = document.getElementById("typewriter");
            if(!elem) return;
            elem.innerHTML = "";
            i = 0;
            typeWriter();
        }

        function typeWriter() {
            const elem = document.getElementById("typewriter");
            if (elem && i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        window.addEventListener('load', () => { render(); });
    </script>
</body>
</html>
