<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste-to-Wealth | Circular Economy Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            800: '#292524',
                            900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            color: #1c1917;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.1s ease;
        }
        
        /* Typography Cursor */
        .cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #1c1917;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Flat Inputs */
        input[type=text], input[type=number], select {
            border: none;
            background-color: transparent;
            padding: 12px 0;
            outline: none;
            border-radius: 0;
            border-bottom: 2px solid rgba(28, 25, 23, 0.2);
            width: 100%;
            font-size: 1.125rem;
            color: #1c1917;
        }
        input[type=text]:focus, input[type=number]:focus, select:focus {
            border-bottom: 2px solid #1c1917;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Flat Buttons & Navigation */
        .primary-btn {
            background-color: #1c1917;
            color: #ffffff;
            padding: 1rem 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: none;
        }
        .primary-btn:disabled {
            background-color: rgba(28, 25, 23, 0.2);
            color: rgba(28, 25, 23, 0.5);
            cursor: not-allowed;
        }
        .nav-tab-active {
            border-bottom: 3px solid #1c1917;
            color: #1c1917;
            font-weight: 700;
        }
        .nav-tab-inactive {
            border-bottom: 3px solid transparent;
            color: rgba(28, 25, 23, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Navigation -->
    <nav id="main-nav" class="fixed top-0 w-full z-50 transition-colors duration-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 border-b border-stone-900/20">
            <div class="flex items-center justify-between h-24">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="router.navigate('landing')">
                    <i class="fa-solid fa-recycle text-3xl text-stone-900 mr-4"></i>
                    <span class="font-display text-2xl font-bold tracking-widest text-stone-900 uppercase">Waste <span class="font-light">To</span> Wealth</span>
                </div>
                
                <div class="hidden md:flex space-x-10">
                    <button onclick="router.navigate('admin')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-900" data-role="admin">Admin</button>
                    <button onclick="router.navigate('producer')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-900" data-role="producer">Producer</button>
                    <button onclick="router.navigate('processor')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-900" data-role="processor">Processor</button>
                    <button onclick="router.navigate('farmer')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-900" data-role="farmer">Farmer</button>
                </div>

                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="text-stone-900 focus:outline-none">
                        <i class="fa-solid fa-bars text-3xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden border-b border-stone-900/20 w-full transition-colors duration-100">
            <div class="px-6 py-6 space-y-6">
                <a onclick="router.navigate('admin'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Admin Dashboard</a>
                <a onclick="router.navigate('producer'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Producer Dashboard</a>
                <a onclick="router.navigate('processor'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Processor Dashboard</a>
                <a onclick="router.navigate('farmer'); toggleMobileMenu()" class="block text-lg font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Farmer Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="flex-grow pt-40 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full mb-32"></main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'landing',
            subViews: {
                admin: 'metrics',
                producer: 'log',
                processor: 'inventory',
                farmer: 'market'
            },
            cart: [],
            deliveryFee: 0,
            deliveryType: 'pickup',
            platformRevenue: {
                pickupCommissions: 12500,
                marketplaceCommissions: 45000,
                trainingFees: 8000
            },
            counties: [
                "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita-Taveta", "Garissa", "Wajir", "Mandera", "Marsabit", 
                "Isiolo", "Meru", "Tharaka-Nithi", "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga", 
                "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia", "Uasin Gishu", "Elgeyo-Marakwet", 
                "Nandi", "Baringo", "Laikipia", "Nakuru", "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", 
                "Bungoma", "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira", "Nairobi"
            ],
            academy: [
                { id: 101, title: 'Basics of Organic Sorting & Segregation', date: 'Sessions coming soon', fee: 1500, icon: 'fa-trash-arrow-up' },
                { id: 102, title: 'Commercial Composting Techniques', date: 'Sessions coming soon', fee: 3500, icon: 'fa-seedling' },
                { id: 103, title: 'Biogas Plant Management & Safety', date: 'Sessions coming soon', fee: 2500, icon: 'fa-fire-flame-simple' }
            ],
            stats: {
                totalWaste: 12500,
                fertilizerProduced: 4500,
                feedSales: 450000,
                co2Saved: 8500
            },
            producer: {
                credits: 1250,
                history: [
                    { id: 1, date: '2026-03-10', type: 'Food Waste', location: 'Nairobi', amount: 50, credits: 25, pickupFee: 1500 },
                    { id: 2, date: '2026-03-12', type: 'Garden Waste', location: 'Kiambu', amount: 100, credits: 30, pickupFee: 2000 }
                ],
                analysisLogs: [
                    { batch: "#QA-2991", date: "Mar 10, 2026", moisture: "62%", contam: "0.4%", grade: "A+", notes: "Excellent quality, high organic content." },
                    { batch: "#QA-2988", date: "Mar 08, 2026", moisture: "58%", contam: "1.2%", grade: "B", notes: "Slight plastic traces found in pre-sort." },
                ]
            },
            adminOrders: [
                { id: "TRK-9021", farmerName: "Sunnyside Farm", details: "2x Premium Organic Compost", total: 3000, status: "Auto-Approved", reason: "Sufficient stock & clear payment" }
            ],
            farmer: {
                orders: [
                    { id: "TRK-9021", name: "Premium Organic Compost", qty: 2, total: 3000, status: "Processing", date: "Mar 14, 2026", estDelivery: "Mar 17, 2026" },
                    { id: "TRK-8802", name: "Nutri-Rich Liquid Fertilizer", qty: 1, total: 2500, status: "Shipped", date: "Mar 12, 2026", estDelivery: "Mar 15, 2026" },
                    { id: "TRK-7540", name: "Balanced Animal Feed", qty: 5, total: 20000, status: "Delivered", date: "Feb 28, 2026", estDelivery: "Delivered" }
                ]
            },
            processor: {
                inventoryList: [
                    { id: 'C-101', type: 'Compost', batch: 'B-299', qty: 500, unit: 'kg', status: 'Ready' },
                    { id: 'C-102', type: 'Compost', batch: 'B-300', qty: 300, unit: 'kg', status: 'Curing' },
                    { id: 'F-201', type: 'Feed', batch: 'F-055', qty: 200, unit: 'kg', status: 'Ready' },
                ],
                intakeLog: [],
                units: [
                    { id: 1, name: 'Digester A (Bio-Gas)', progress: 75, daysLeft: 5 }, 
                    { id: 2, name: 'Composter B (Aerobic)', progress: 45, daysLeft: 12 },
                    { id: 3, name: 'Digester C (Sludge)', progress: 90, daysLeft: 1 } 
                ]
            },
            market: [
                { id: 1, name: 'Premium Organic Compost', price: 1500, unit: '50kg Bag', stock: 100, icon: 'fa-seedling' },
                { id: 2, name: 'Nutri-Rich Liquid Fertilizer', price: 2500, unit: '10L Drum', stock: 50, icon: 'fa-flask' },
                { id: 3, name: 'Balanced Animal Feed', price: 4000, unit: '25kg Bag', stock: 80, icon: 'fa-cow' },
                { id: 4, name: 'Bio-Char Soil Amendment', price: 3000, unit: '10kg Bag', stock: 25, icon: 'fa-fire-burner' }
            ]
        };

        const router = {
            navigate: (view) => {
                state.currentView = view;
                render();
                window.scrollTo(0,0);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if(btn.dataset.role === view) {
                        btn.classList.remove('text-stone-600');
                        btn.classList.add('text-stone-900', 'border-b-2', 'border-stone-900');
                    } else {
                        btn.classList.add('text-stone-600');
                        btn.classList.remove('text-stone-900', 'border-b-2', 'border-stone-900');
                    }
                });
            },
            setSubView: (role, subView) => {
                state.subViews[role] = subView;
                render();
            }
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            toast.className = `px-6 py-4 bg-stone-900 text-white flex items-center min-w-[300px] mb-2`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-check' : 'fa-info-circle'} text-xl mr-4"></i>
                <div>
                    <h4 class="font-bold text-sm uppercase tracking-widest">${type}</h4>
                    <p class="text-stone-300 text-sm mt-1">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        function formatNum(num) {
            return new Intl.NumberFormat().format(num);
        }

        // --- BUSINESS LOGIC ---

        function handleWasteSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('wasteType').value;
            const amount = parseFloat(document.getElementById('wasteAmount').value);
            const location = document.getElementById('wasteLocation').value;
            
            if(!amount || amount <= 0) return showToast('Please select a valid amount', 'error');
            if(!location) return showToast('Please select a location', 'error');

            const basePickupFee = 1000; 
            const weightFee = amount * 10; 
            const totalPickupFee = basePickupFee + weightFee;
            
            const platformCommission = totalPickupFee * 0.15;
            state.platformRevenue.pickupCommissions += platformCommission;

            const earnedCredits = Math.floor(amount * 0.5);
            state.producer.credits += earnedCredits;
            state.stats.totalWaste += amount;
            
            state.producer.history.unshift({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                type: type,
                location: location,
                amount: amount,
                credits: earnedCredits,
                pickupFee: totalPickupFee
            });

            showToast(`Payment recorded (Simulated). Fee: Ksh ${formatNum(totalPickupFee)}`, 'info');
            setTimeout(() => {
                showToast(`Pickup scheduled successfully! Earned ${earnedCredits} PTS.`);
                render();
            }, 1000);
        }

        function addToCart(productId) {
            const product = state.market.find(p => p.id === productId);
            const qtyInput = document.getElementById(`qty-${productId}`);
            const qty = parseInt(qtyInput.value) || 1;

            if (qty > product.stock) return showToast('Not enough stock available', 'error');

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty + qty > product.stock) return showToast('Stock limit reached', 'error');
                existing.qty += qty;
            } else {
                state.cart.push({ ...product, qty: qty });
            }
            
            product.stock -= qty; 
            showToast(`Added ${qty} x ${product.name} to cart`);
            render();
        }

        function updateDeliveryFee() {
            const type = document.querySelector('input[name="deliveryType"]:checked').value;
            state.deliveryType = type;
            state.deliveryFee = (type === 'door') ? 1000 : 0;
            render();
        }

        function checkout(e) {
            if(e) e.preventDefault();
            if (state.cart.length === 0) return showToast('Cart is empty', 'error');
            
            const name = document.getElementById('checkoutName').value;
            const location = document.getElementById('checkoutLocation').value;
            
            if(!name || (state.deliveryType === 'door' && !location)) {
                return showToast('Please fill in all delivery details', 'error');
            }

            const trackingId = "TRK-" + Math.floor(1000 + Math.random() * 9000);
            let orderSubtotal = 0;
            let orderDetailsStr = "";

            const estDate = new Date();
            estDate.setDate(estDate.getDate() + 3);

            state.cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                orderSubtotal += itemTotal;
                orderDetailsStr += `${item.qty}x ${item.name}, `;
                
                state.farmer.orders.unshift({
                    id: trackingId,
                    name: item.name,
                    qty: item.qty,
                    total: itemTotal,
                    date: new Date().toLocaleDateString(),
                    status: 'Processing',
                    estDelivery: estDate.toLocaleDateString()
                });
                state.stats.feedSales += itemTotal;
            });
            
            state.adminOrders.unshift({
                id: trackingId,
                farmerName: name,
                details: orderDetailsStr.slice(0, -2),
                total: orderSubtotal,
                status: "Auto-Approved",
                reason: "System verified stock availability."
            });

            const platformCommission = orderSubtotal * 0.10;
            state.platformRevenue.marketplaceCommissions += platformCommission;

            state.cart = [];
            showToast(`Payment successful! Order Auto-Approved. Tracking ID: ${trackingId}`);
            router.setSubView('farmer', 'orders');
        }

        function bookTraining(id) {
            const course = state.academy.find(c => c.id === id);
            showToast('Initiating payment method...', 'info');
            setTimeout(() => {
                state.platformRevenue.trainingFees += course.fee;
                showToast(`Payment received! Confirmation sent via Email, SMS, & WhatsApp.`, 'success');
                render();
            }, 2500);
        }

        function handleIntakeLog(e) {
            e.preventDefault();
            const source = document.getElementById('intakeSource').value;
            const weight = document.getElementById('intakeWeight').value;

            state.processor.intakeLog.unshift({
                time: new Date().toLocaleTimeString(),
                source: source,
                weight: weight,
                status: 'Logged'
            });

            state.stats.totalWaste += parseFloat(weight);
            showToast(`Logged intake of ${weight}kg`);
            render();
        }

        function updateProductStock(id) {
            const newStock = parseInt(document.getElementById(`stock-edit-${id}`).value);
            const product = state.market.find(p => p.id === id);
            if(product && newStock >= 0) {
                product.stock = newStock;
                showToast(`Stock updated for ${product.name}`);
                render();
            }
        }

        function generateGauge(percentage) {
            const totalLen = 126;
            const strokeLen = (percentage / 100) * totalLen;
            return `
                <svg viewBox="0 0 100 60" class="w-full h-auto">
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="rgba(28,25,23,0.1)" stroke-width="4" stroke-linecap="butt" />
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#1c1917" stroke-width="4" stroke-linecap="butt" stroke-dasharray="${strokeLen} 1000" />
                    <text x="50" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="#1c1917">${percentage}%</text>
                </svg>
            `;
        }

        function getTrackingUI(order) {
            let progress = 25;
            let isProcessing = false, isShipped = false, isDelivered = false;
            
            if(order.status === 'Processing' || order.status === 'In Warehouse') { progress = 50; isProcessing = true; }
            else if(order.status === 'Shipped') { progress = 75; isProcessing = true; isShipped = true; }
            else if(order.status === 'Delivered') { progress = 100; isProcessing = true; isShipped = true; isDelivered = true; }

            return `
                <div class="mt-12 mb-8 w-full max-w-3xl">
                    <div class="relative flex items-center justify-between w-full">
                        <div class="absolute left-0 top-4 w-full h-px bg-stone-900/20 z-0"></div>
                        <div class="absolute left-0 top-4 h-px bg-stone-900 z-0" style="width: ${progress}%;"></div>
                        
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isProcessing ? 'text-stone-900' : 'text-stone-900'} bg-inherit px-2"><i class="fa-solid fa-check-circle"></i></div>
                            <span class="text-xs font-bold mt-4 uppercase tracking-widest text-stone-900">Placed</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isProcessing ? 'text-stone-900' : 'text-stone-900/20'} bg-inherit px-2"><i class="fa-solid fa-box"></i></div>
                            <span class="text-xs ${isProcessing ? 'font-bold text-stone-900' : 'text-stone-900/50'} mt-4 uppercase tracking-widest">Warehouse</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isShipped ? 'text-stone-900' : 'text-stone-900/20'} bg-inherit px-2"><i class="fa-solid fa-truck"></i></div>
                            <span class="text-xs ${isShipped ? 'font-bold text-stone-900' : 'text-stone-900/50'} mt-4 uppercase tracking-widest">Shipped</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center">
                            <div class="text-2xl ${isDelivered ? 'text-stone-900' : 'text-stone-900/20'} bg-inherit px-2"><i class="fa-solid fa-flag-checkered"></i></div>
                            <span class="text-xs ${isDelivered ? 'font-bold text-stone-900' : 'text-stone-900/50'} mt-4 uppercase tracking-widest">Delivered</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- VIEWS ---

        function renderLanding() {
            return `
                <div class="flex flex-col min-h-[60vh] py-12">
                    <div class="space-y-6 max-w-4xl">
                        <span class="text-stone-900 text-xs font-bold tracking-widest uppercase border-b-2 border-stone-900 pb-2">Circular Economy V1.0</span>
                        <h1 class="text-6xl md:text-8xl font-display font-bold text-stone-900 leading-tight mt-8">
                            <span id="typewriter" class="text-stone-900 cursor"></span>
                        </h1>
                        <p class="text-stone-800 text-xl md:text-2xl max-w-3xl pt-8 leading-relaxed">
                            A completely decentralized platform connecting producers, farmers, and processors to transform organic waste into valuable resources.
                        </p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 w-full mt-32 border-t-2 border-stone-900/20 pt-16">
                        <div class="cursor-pointer" onclick="router.navigate('admin')">
                            <div class="text-stone-900 text-4xl mb-6"><i class="fa-solid fa-chart-pie"></i></div>
                            <h3 class="text-stone-900 font-bold text-2xl uppercase tracking-widest mb-3">Admin</h3>
                            <p class="text-base text-stone-700">Oversee ecosystem & financials.</p>
                        </div>
                        <div class="cursor-pointer" onclick="router.navigate('producer')">
                            <div class="text-stone-900 text-4xl mb-6"><i class="fa-solid fa-leaf"></i></div>
                            <h3 class="text-stone-900 font-bold text-2xl uppercase tracking-widest mb-3">Producer</h3>
                            <p class="text-base text-stone-700">Log waste, track quality & learn.</p>
                        </div>
                        <div class="cursor-pointer" onclick="router.navigate('processor')">
                            <div class="text-stone-900 text-4xl mb-6"><i class="fa-solid fa-gears"></i></div>
                            <h3 class="text-stone-900 font-bold text-2xl uppercase tracking-widest mb-3">Processor</h3>
                            <p class="text-base text-stone-700">Manage operations & products.</p>
                        </div>
                        <div class="cursor-pointer" onclick="router.navigate('farmer')">
                            <div class="text-stone-900 text-4xl mb-6"><i class="fa-solid fa-basket-shopping"></i></div>
                            <h3 class="text-stone-900 font-bold text-2xl uppercase tracking-widest mb-3">Farmer</h3>
                            <p class="text-base text-stone-700">Buy products, track orders.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            const activeTab = state.subViews.admin;
            const getTabClass = (tab) => activeTab === tab ? 'nav-tab-active' : 'nav-tab-inactive';
            const totalRevenue = state.platformRevenue.pickupCommissions + state.platformRevenue.marketplaceCommissions + state.platformRevenue.trainingFees;

            return `
                <div class="space-y-16">
                    <div class="border-b-2 border-stone-900/20 pb-8">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-6xl font-display font-bold text-stone-900">System Overview</h2>
                            <span class="text-stone-900 text-xs font-bold tracking-widest uppercase"><i class="fa-solid fa-circle text-[8px] mr-2"></i>Live Status</span>
                        </div>
                        <div class="flex space-x-12 overflow-x-auto w-full">
                            <button onclick="router.setSubView('admin', 'metrics')" class="pb-4 text-sm uppercase tracking-widest whitespace-nowrap ${getTabClass('metrics')}">Metrics & Financials</button>
                            <button onclick="router.setSubView('admin', 'orders')" class="pb-4 text-sm uppercase tracking-widest whitespace-nowrap ${getTabClass('orders')}">Order Approvals</button>
                        </div>
                    </div>

                    ${activeTab === 'metrics' ? `
                        <div class="space-y-24">
                            <div>
                                <h3 class="text-xs font-bold text-stone-600 uppercase tracking-widest mb-10">Platform Revenue (Monetization)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
                                    <div>
                                        <p class="text-stone-600 text-xs font-bold uppercase tracking-widest mb-4">Total Revenue</p>
                                        <h3 class="text-5xl font-bold text-stone-900">Ksh ${formatNum(totalRevenue)}</h3>
                                        <p class="text-xs text-stone-900 mt-6 font-bold uppercase tracking-widest pt-4 border-t-2 border-stone-900/20"><i class="fa-solid fa-building-columns mr-3"></i>Routed to Bank</p>
                                    </div>
                                    <div>

                                                    <div>
                                                        <h4 class="text-stone-900 font-bold text-2xl mb-2">${item.name}</h4>
                                                        <p class="text-stone-600 text-lg">${item.qty} x Ksh ${formatNum(item.price)}</p>
                                                    </div>
                                                    <p class="text-stone-900 font-bold text-3xl">Ksh ${formatNum(item.qty * item.price)}</p>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                                
                                ${state.cart.length > 0 ? `
                                    <div class="pt-10 border-t-2 border-stone-900/20">
                                        <h3 class="text-xs font-bold text-stone-600 uppercase tracking-widest mb-10">Shipping Details</h3>
                                        <form id="checkoutForm" class="space-y-10">
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                <div>
                                                    <label class="block text-[10px] font-bold text-stone-600 uppercase tracking-widest mb-4">Full Name</label>
                                                    <input type="text" id="checkoutName" required>
                                                </div>
                                                <div>
                                                    <label class="block text-[10px] font-bold text-stone-600 uppercase tracking-widest mb-4">Phone Number</label>
                                                    <input type="text" id="checkoutPhone" required>
                                                </div>
                                            </div>
                                            <div class="pt-6 border-t border-stone-900/10">
                                                <label class="block text-[10px] font-bold text-stone-600 uppercase tracking-widest mb-8">Delivery Method</label>
                                                <div class="flex flex-col space-y-8">
                                                    <label class="flex items-center space-x-6 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="pickup" checked onchange="updateDeliveryFee()" class="w-6 h-6 border-stone-900">
                                                        <span class="text-stone-900 text-xl font-bold">Pick-up Point (Free)</span>
                                                    </label>
                                                    <label class="flex items-center space-x-6 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="door" onchange="updateDeliveryFee()" class="w-6 h-6 border-stone-900">
                                                        <span class="text-stone-900 text-xl font-bold">Door Delivery (+Ksh 1,000)</span>
                                                    </label>
                                                </div>
                                            </div>
                                            <div id="locationField" class="pt-6 border-t border-stone-900/10">
                                                <label class="block text-[10px] font-bold text-stone-600 uppercase tracking-widest mb-4">Delivery Location / Pick-up Station</label>
                                                <input type="text" id="checkoutLocation">
                                            </div>
                                        </form>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="pl-0 lg:pl-20 lg:border-l-2 border-stone-900/20">
                                <h3 class="text-xs font-bold text-stone-600 uppercase tracking-widest mb-10">Order Summary</h3>
                                <div class="space-y-8 text-xl mb-16">
                                    <div class="flex justify-between text-stone-700"><span>Subtotal</span><span>Ksh ${formatNum(subtotal)}</span></div>
                                    <div class="flex justify-between text-stone-700"><span>Delivery Fee</span><span>Ksh ${formatNum(state.deliveryFee)}</span></div>
                                    <div class="flex justify-between text-stone-900 font-bold text-4xl pt-10 border-t-2 border-stone-900/20 mt-10">
                                        <span>Total</span><span>Ksh ${formatNum(total)}</span>
                                    </div>
                                </div>
                                <div class="space-y-8">
                                    <button onclick="checkout(event)" class="primary-btn w-full py-6 text-base">Pay & Checkout</button>
                                    <button onclick="router.setSubView('farmer', 'market')" class="w-full text-stone-600 font-bold uppercase tracking-widest text-sm text-center py-4 border border-stone-900/20">Continue Shopping</button>
                                </div>
                            </div>
                        </div>` : ''}

                    ${activeTab === 'orders' ? `
                        <div>
                            <h3 class="text-xs font-bold text-stone-600 uppercase tracking-widest mb-12">Your Orders & Deliveries</h3>
                            <div class="space-y-20">
                                ${state.farmer.orders.map(o => `
                                    <div class="pb-16 border-b-2 border-stone-900/20">
                                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12">
                                            <div>
                                                <h4 class="text-stone-900 font-bold text-4xl mb-4">${o.name}</h4>
                                                <p class="text-sm text-stone-600 uppercase tracking-widest">ID: <span class="font-bold text-stone-900">${o.id}</span> <span class="mx-4 text-stone-300">|</span> Placed: ${o.date}</p>
                                            </div>
                                            <div class="mt-8 md:mt-0 text-left md:text-right">
                                                <p class="text-stone-900 font-bold text-3xl mb-2">Ksh ${formatNum(o.total || 0)}</p>
                                                <p class="text-stone-600 text-lg">Qty: ${o.qty || 1}</p>
                                            </div>
                                        </div>
                                        
                                        ${getTrackingUI(o)}
                                        
                                        <div class="mt-16 pt-10 border-t-2 border-stone-900/10 flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <p class="text-sm font-bold text-stone-600 uppercase tracking-widest mb-4 md:mb-0">Status: <span class="text-stone-900 text-base ml-4">${o.status}</span></p>
                                            ${o.status !== 'Delivered' ? `<p class="text-sm text-stone-600 uppercase tracking-widest">Est. Delivery: <span class="font-bold text-stone-900 ml-4 text-base">${o.estDelivery}</span></p>` : `<p class="text-sm text-stone-900 font-bold uppercase tracking-widest"><i class="fa-solid fa-check mr-3"></i>Order Complete</p>`}
                                        </div>
                                    </div>
                                `).join('')}
                                ${state.farmer.orders.length === 0 ? '<p class="text-stone-600 text-xl italic">No orders yet.</p>' : ''}
                            </div>
                        </div>` : ''}

                    ${activeTab === 'academy' ? renderAcademy() : ''}
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('app-root');
            const body = document.body;
            const nav = document.getElementById('main-nav');
            const menu = document.getElementById('mobile-menu');
            
            // Clean specific bg classes dynamically
            let bgColor = '#ffffff';

            switch(state.currentView) {
                case 'landing': bgColor = '#e8f5e9'; break; // Light Green
                case 'admin': bgColor = '#fffde7'; break; // Creamy Yellow White
                case 'producer': bgColor = '#d7ccc8'; break; // Cool Brown
                case 'farmer': bgColor = '#c8e6c9'; break; // Modern Green
                case 'processor': bgColor = '#d7ccc8'; break; // Cool Brown
            }

            body.style.backgroundColor = bgColor;
            nav.style.backgroundColor = bgColor;
            menu.style.backgroundColor = bgColor;

            root.innerHTML = ''; 
            switch(state.currentView) {
                case 'landing': root.innerHTML = renderLanding(); initTypewriter(); break;
                case 'admin': root.innerHTML = renderAdmin(); break;
                case 'producer': root.innerHTML = renderProducer(); break;
                case 'farmer': root.innerHTML = renderFarmer(); break;
                case 'processor': root.innerHTML = renderProcessor(); break;
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        let i = 0;
        const text = "Welcome to Waste to Wealth";
        function initTypewriter() {
            const elem = document.getElementById("typewriter");
            if(!elem) return;
            elem.innerHTML = "";
            i = 0;
            typeWriter();
        }

        function typeWriter() {
            const elem = document.getElementById("typewriter");
            if (elem && i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        window.addEventListener('load', () => { render(); });
    </script>
</body>
</html>
