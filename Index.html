<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste-to-Wealth | Circular Economy Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            50: '#ffffff',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            600: '#57534e',
                            800: '#292524',
                            900: '#1c1917',
                        },
                        green: {
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brown: {
                            600: '#854d0e',
                            700: '#713f12',
                            800: '#57330e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #1c1917;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #ffffff; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; }
        .cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #15803d;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        .nav-tab-active {
            border-bottom: 2px solid #15803d;
            color: #15803d;
        }
        .nav-tab-inactive {
            border-bottom: 2px solid transparent;
            color: #57534e;
        }
        
        /* Flat, borderless inputs */
        input[type=text], input[type=number], select {
            border: none;
            background-color: transparent;
            padding: 12px 0;
            outline: none;
            border-radius: 0;
            border-bottom: 2px solid #e7e5e4;
            width: 100%;
            font-size: 1.125rem;
            color: #1c1917;
        }
        input[type=text]:focus, input[type=number]:focus, select:focus {
            border-bottom: 2px solid #15803d;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        button {
            border-radius: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="router.navigate('landing')">
                    <i class="fa-solid fa-recycle text-3xl text-green-800 mr-3"></i>
                    <span class="font-display text-xl font-bold tracking-wider text-stone-900">W2W <span class="text-green-800">SYSTEM</span></span>
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <button onclick="router.navigate('admin')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-600" data-role="admin">Admin</button>
                    <button onclick="router.navigate('producer')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-600" data-role="producer">Producer</button>
                    <button onclick="router.navigate('processor')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-600" data-role="processor">Processor</button>
                    <button onclick="router.navigate('farmer')" class="nav-btn text-sm font-bold uppercase tracking-widest text-stone-600" data-role="farmer">Farmer</button>
                </div>

                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="text-stone-900 focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-stone-200 absolute w-full">
            <div class="px-6 py-4 space-y-4">
                <a onclick="router.navigate('admin'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Admin Dashboard</a>
                <a onclick="router.navigate('producer'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Producer Dashboard</a>
                <a onclick="router.navigate('processor'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Processor Dashboard</a>
                <a onclick="router.navigate('farmer'); toggleMobileMenu()" class="block text-sm font-bold uppercase tracking-widest text-stone-900 cursor-pointer">Farmer Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="flex-grow pt-32 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full mb-20"></main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'landing',
            subViews: {
                admin: 'metrics',
                producer: 'log',
                processor: 'inventory',
                farmer: 'market'
            },
            cart: [],
            deliveryFee: 0,
            deliveryType: 'pickup',
            platformRevenue: {
                pickupCommissions: 12500,
                marketplaceCommissions: 45000,
                trainingFees: 8000
            },
            counties: [
                "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita-Taveta", "Garissa", "Wajir", "Mandera", "Marsabit", 
                "Isiolo", "Meru", "Tharaka-Nithi", "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga", 
                "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia", "Uasin Gishu", "Elgeyo-Marakwet", 
                "Nandi", "Baringo", "Laikipia", "Nakuru", "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", 
                "Bungoma", "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira", "Nairobi"
            ],
            academy: [
                { id: 101, title: 'Basics of Organic Sorting & Segregation', date: 'Sessions coming soon', fee: 1500, icon: 'fa-trash-arrow-up' },
                { id: 102, title: 'Commercial Composting Techniques', date: 'Sessions coming soon', fee: 3500, icon: 'fa-seedling' },
                { id: 103, title: 'Biogas Plant Management & Safety', date: 'Sessions coming soon', fee: 2500, icon: 'fa-fire-flame-simple' }
            ],
            stats: {
                totalWaste: 12500,
                fertilizerProduced: 4500,
                feedSales: 450000,
                co2Saved: 8500
            },
            producer: {
                credits: 1250,
                history: [
                    { id: 1, date: '2026-03-10', type: 'Food Waste', location: 'Nairobi', amount: 50, credits: 25, pickupFee: 1500 },
                    { id: 2, date: '2026-03-12', type: 'Garden Waste', location: 'Kiambu', amount: 100, credits: 30, pickupFee: 2000 }
                ],
                analysisLogs: [
                    { batch: "#QA-2991", date: "Mar 10, 2026", moisture: "62%", contam: "0.4%", grade: "A+", notes: "Excellent quality, high organic content." },
                    { batch: "#QA-2988", date: "Mar 08, 2026", moisture: "58%", contam: "1.2%", grade: "B", notes: "Slight plastic traces found in pre-sort." },
                ]
            },
            adminOrders: [
                { id: "TRK-9021", farmerName: "Sunnyside Farm", details: "2x Premium Organic Compost", total: 3000, status: "Auto-Approved", reason: "Sufficient stock & clear payment" }
            ],
            farmer: {
                orders: [
                    { id: "TRK-9021", name: "Premium Organic Compost", qty: 2, total: 3000, status: "Processing", date: "Mar 14, 2026", estDelivery: "Mar 17, 2026" },
                    { id: "TRK-8802", name: "Nutri-Rich Liquid Fertilizer", qty: 1, total: 2500, status: "Shipped", date: "Mar 12, 2026", estDelivery: "Mar 15, 2026" },
                    { id: "TRK-7540", name: "Balanced Animal Feed", qty: 5, total: 20000, status: "Delivered", date: "Feb 28, 2026", estDelivery: "Delivered" }
                ]
            },
            processor: {
                inventoryList: [
                    { id: 'C-101', type: 'Compost', batch: 'B-299', qty: 500, unit: 'kg', status: 'Ready' },
                    { id: 'C-102', type: 'Compost', batch: 'B-300', qty: 300, unit: 'kg', status: 'Curing' },
                    { id: 'F-201', type: 'Feed', batch: 'F-055', qty: 200, unit: 'kg', status: 'Ready' },
                ],
                intakeLog: [],
                units: [
                    { id: 1, name: 'Digester A (Bio-Gas)', progress: 75, daysLeft: 5, color: '#16a34a' }, 
                    { id: 2, name: 'Composter B (Aerobic)', progress: 45, daysLeft: 12, color: '#854d0e' },
                    { id: 3, name: 'Digester C (Sludge)', progress: 90, daysLeft: 1, color: '#1c1917' } 
                ]
            },
            market: [
                { id: 1, name: 'Premium Organic Compost', price: 1500, unit: '50kg Bag', stock: 100, icon: 'fa-seedling', iconColor: 'text-green-800' },
                { id: 2, name: 'Nutri-Rich Liquid Fertilizer', price: 2500, unit: '10L Drum', stock: 50, icon: 'fa-flask', iconColor: 'text-stone-800' },
                { id: 3, name: 'Balanced Animal Feed', price: 4000, unit: '25kg Bag', stock: 80, icon: 'fa-cow', iconColor: 'text-brown-800' },
                { id: 4, name: 'Bio-Char Soil Amendment', price: 3000, unit: '10kg Bag', stock: 25, icon: 'fa-fire-burner', iconColor: 'text-stone-900' }
            ]
        };

        const router = {
            navigate: (view) => {
                state.currentView = view;
                render();
                window.scrollTo(0,0);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if(btn.dataset.role === view) {
                        btn.classList.add('text-green-800');
                        btn.classList.remove('text-stone-600');
                    } else {
                        btn.classList.remove('text-green-800');
                        btn.classList.add('text-stone-600');
                    }
                });
            },
            setSubView: (role, subView) => {
                state.subViews[role] = subView;
                render();
            }
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'border-green-800 text-green-900 bg-white' : (type === 'info' ? 'border-stone-800 text-stone-900 bg-white' : 'border-brown-800 text-brown-900 bg-white');
            const icon = type === 'success' ? 'fa-circle-check' : (type === 'info' ? 'fa-circle-info' : 'fa-circle-exclamation');
            
            toast.className = `px-6 py-4 border border-stone-200 border-l-4 ${colors} flex items-center min-w-[300px] mb-2`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-xl mr-3"></i>
                <div>
                    <h4 class="font-bold text-sm uppercase tracking-wide">${type}</h4>
                    <p class="text-stone-600 text-sm">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 4000);
        }

        function formatNum(num) {
            return new Intl.NumberFormat().format(num);
        }

        // --- BUSINESS LOGIC ---

        function handleWasteSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('wasteType').value;
            const amount = parseFloat(document.getElementById('wasteAmount').value);
            const location = document.getElementById('wasteLocation').value;
            
            if(!amount || amount <= 0) return showToast('Please select a valid amount', 'error');
            if(!location) return showToast('Please select a location', 'error');

            const basePickupFee = 1000; 
            const weightFee = amount * 10; 
            const totalPickupFee = basePickupFee + weightFee;
            
            const platformCommission = totalPickupFee * 0.15;
            state.platformRevenue.pickupCommissions += platformCommission;

            const earnedCredits = Math.floor(amount * 0.5);
            state.producer.credits += earnedCredits;
            state.stats.totalWaste += amount;
            
            state.producer.history.unshift({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                type: type,
                location: location,
                amount: amount,
                credits: earnedCredits,
                pickupFee: totalPickupFee
            });

            showToast(`Payment recorded (Simulated). Fee: Ksh ${formatNum(totalPickupFee)}`, 'info');
            setTimeout(() => {
                showToast(`Pickup scheduled successfully! Earned ${earnedCredits} PTS.`);
                render();
            }, 1000);
        }

        function addToCart(productId) {
            const product = state.market.find(p => p.id === productId);
            const qtyInput = document.getElementById(`qty-${productId}`);
            const qty = parseInt(qtyInput.value) || 1;

            if (qty > product.stock) return showToast('Not enough stock available', 'error');

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty + qty > product.stock) return showToast('Stock limit reached', 'error');
                existing.qty += qty;
            } else {
                state.cart.push({ ...product, qty: qty });
            }
            
            product.stock -= qty; 
            showToast(`Added ${qty} x ${product.name} to cart`);
            render();
        }

        function updateDeliveryFee() {
            const type = document.querySelector('input[name="deliveryType"]:checked').value;
            state.deliveryType = type;
            state.deliveryFee = (type === 'door') ? 1000 : 0;
            render();
        }

        function checkout(e) {
            if(e) e.preventDefault();
            if (state.cart.length === 0) return showToast('Cart is empty', 'error');
            
            const name = document.getElementById('checkoutName').value;
            const location = document.getElementById('checkoutLocation').value;
            
            if(!name || (state.deliveryType === 'door' && !location)) {
                return showToast('Please fill in all delivery details', 'error');
            }

            const trackingId = "TRK-" + Math.floor(1000 + Math.random() * 9000);
            let orderSubtotal = 0;
            let orderDetailsStr = "";

            const estDate = new Date();
            estDate.setDate(estDate.getDate() + 3);

            state.cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                orderSubtotal += itemTotal;
                orderDetailsStr += `${item.qty}x ${item.name}, `;
                
                state.farmer.orders.unshift({
                    id: trackingId,
                    name: item.name,
                    qty: item.qty,
                    total: itemTotal,
                    date: new Date().toLocaleDateString(),
                    status: 'Processing',
                    estDelivery: estDate.toLocaleDateString()
                });
                state.stats.feedSales += itemTotal;
            });
            
            state.adminOrders.unshift({
                id: trackingId,
                farmerName: name,
                details: orderDetailsStr.slice(0, -2),
                total: orderSubtotal,
                status: "Auto-Approved",
                reason: "System verified stock availability."
            });

            const platformCommission = orderSubtotal * 0.10;
            state.platformRevenue.marketplaceCommissions += platformCommission;

            state.cart = [];
            showToast(`Payment successful! Order Auto-Approved. Tracking ID: ${trackingId}`);
            router.setSubView('farmer', 'orders');
        }

        function bookTraining(id) {
            const course = state.academy.find(c => c.id === id);
            showToast('Initiating payment method...', 'info');
            setTimeout(() => {
                state.platformRevenue.trainingFees += course.fee;
                showToast(`Payment received! Confirmation for ${course.title} sent via Email, SMS, and WhatsApp.`, 'success');
                render();
            }, 2500);
        }

        function handleIntakeLog(e) {
            e.preventDefault();
            const source = document.getElementById('intakeSource').value;
            const weight = document.getElementById('intakeWeight').value;

            state.processor.intakeLog.unshift({
                time: new Date().toLocaleTimeString(),
                source: source,
                weight: weight,
                status: 'Logged'
            });

            state.stats.totalWaste += parseFloat(weight);
            showToast(`Logged intake of ${weight}kg`);
            render();
        }

        function updateProductStock(id) {
            const newStock = parseInt(document.getElementById(`stock-edit-${id}`).value);
            const product = state.market.find(p => p.id === id);
            if(product && newStock >= 0) {
                product.stock = newStock;
                showToast(`Stock updated for ${product.name}`);
                render();
            }
        }

        function generateGauge(percentage, color) {
            const totalLen = 126;
            const strokeLen = (percentage / 100) * totalLen;
            return `
                <svg viewBox="0 0 100 60" class="w-full h-auto">
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e7e5e4" stroke-width="4" stroke-linecap="butt" />
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="butt" stroke-dasharray="${strokeLen} 1000" />
                    <text x="50" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="#1c1917">${percentage}%</text>
                </svg>
            `;
        }

        function getTrackingUI(order) {
            let progress = 25;
            let isProcessing = false, isShipped = false, isDelivered = false;
            
            if(order.status === 'Processing' || order.status === 'In Warehouse') { progress = 50; isProcessing = true; }
            else if(order.status === 'Shipped') { progress = 75; isProcessing = true; isShipped = true; }
            else if(order.status === 'Delivered') { progress = 100; isProcessing = true; isShipped = true; isDelivered = true; }

            return `
                <div class="mt-8 mb-6 w-full max-w-2xl">
                    <div class="relative flex items-center justify-between w-full px-2">
                        <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-px bg-stone-200 z-0"></div>
                        <div class="absolute left-0 top-1/2 transform -translate-y-1/2 h-px bg-green-800 z-0" style="width: ${progress}%;"></div>
                        
                        <div class="relative z-10 flex flex-col items-center bg-white px-2">
                            <div class="text-green-800 text-lg"><i class="fa-solid fa-circle-check"></i></div>
                            <span class="text-[10px] text-stone-900 font-bold mt-2 uppercase tracking-widest">Placed</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center bg-white px-2">
                            <div class="${isProcessing ? 'text-green-800' : 'text-stone-300'} text-lg"><i class="fa-solid fa-box"></i></div>
                            <span class="text-[10px] ${isProcessing ? 'text-stone-900 font-bold' : 'text-stone-500'} mt-2 uppercase tracking-widest">Warehouse</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center bg-white px-2">
                            <div class="${isShipped ? 'text-green-800' : 'text-stone-300'} text-lg"><i class="fa-solid fa-truck"></i></div>
                            <span class="text-[10px] ${isShipped ? 'text-stone-900 font-bold' : 'text-stone-500'} mt-2 uppercase tracking-widest">Shipped</span>
                        </div>
                        <div class="relative z-10 flex flex-col items-center bg-white px-2">
                            <div class="${isDelivered ? 'text-green-800' : 'text-stone-300'} text-lg"><i class="fa-solid fa-flag-checkered"></i></div>
                            <span class="text-[10px] ${isDelivered ? 'text-stone-900 font-bold' : 'text-stone-500'} mt-2 uppercase tracking-widest">Delivered</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- VIEWS ---

        function renderLanding() {
            return `
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center py-12">
                    <div class="space-y-4 max-w-3xl">
                        <span class="text-green-800 text-xs font-bold tracking-widest uppercase border-b border-green-800 pb-1">Circular Economy V1.0</span>
                        <h1 class="text-5xl md:text-7xl font-display font-bold text-stone-900 leading-tight mt-6">
                            <span id="typewriter" class="text-green-800 cursor"></span>
                        </h1>
                        <p class="text-stone-600 text-lg md:text-xl max-w-2xl mx-auto pt-6 leading-relaxed">
                            A completely decentralized platform connecting producers, farmers, and processors to transform organic waste into valuable resources.
                        </p>
                    </div>

                    <div class="flex flex-col md:flex-row gap-12 w-full max-w-5xl mt-24 text-left border-t border-stone-200 pt-12">
                        <div class="flex-1 cursor-pointer" onclick="router.navigate('admin')">
                            <div class="text-brown-700 text-3xl mb-4"><i class="fa-solid fa-chart-pie"></i></div>
                            <h3 class="text-stone-900 font-bold text-lg uppercase tracking-widest mb-2">Admin</h3>
                            <p class="text-sm text-stone-600">Oversee ecosystem & financials.</p>
                        </div>
                        <div class="flex-1 cursor-pointer" onclick="router.navigate('producer')">
                            <div class="text-green-800 text-3xl mb-4"><i class="fa-solid fa-leaf"></i></div>
                            <h3 class="text-stone-900 font-bold text-lg uppercase tracking-widest mb-2">Producer</h3>
                            <p class="text-sm text-stone-600">Log waste, track quality & learn.</p>
                        </div>
                        <div class="flex-1 cursor-pointer" onclick="router.navigate('processor')">
                            <div class="text-stone-800 text-3xl mb-4"><i class="fa-solid fa-gears"></i></div>
                            <h3 class="text-stone-900 font-bold text-lg uppercase tracking-widest mb-2">Processor</h3>
                            <p class="text-sm text-stone-600">Manage operations & products.</p>
                        </div>
                        <div class="flex-1 cursor-pointer" onclick="router.navigate('farmer')">
                            <div class="text-brown-800 text-3xl mb-4"><i class="fa-solid fa-basket-shopping"></i></div>
                            <h3 class="text-stone-900 font-bold text-lg uppercase tracking-widest mb-2">Farmer</h3>
                            <p class="text-sm text-stone-600">Buy products, track orders.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            const activeTab = state.subViews.admin;
            const getTabClass = (tab) => activeTab === tab ? 'text-green-800 border-b-2 border-green-800' : 'text-stone-500 border-b-2 border-transparent';
            const totalRevenue = state.platformRevenue.pickupCommissions + state.platformRevenue.marketplaceCommissions + state.platformRevenue.trainingFees;

            return `
                <div class="space-y-12">
                    <div class="border-b border-stone-200 pb-8">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-5xl font-display font-bold text-stone-900">System Overview</h2>
                            <span class="text-green-800 text-xs font-bold tracking-widest uppercase"><i class="fa-solid fa-circle text-[8px] mr-2"></i>Live Status</span>
                        </div>
                        <div class="flex space-x-8 overflow-x-auto w-full">
                            <button onclick="router.setSubView('admin', 'metrics')" class="pb-3 text-sm font-bold uppercase tracking-widest whitespace-nowrap ${getTabClass('metrics')}">Metrics & Financials</button>
                            <button onclick="router.setSubView('admin', 'orders')" class="pb-3 text-sm font-bold uppercase tracking-widest whitespace-nowrap ${getTabClass('orders')}">Order Approvals</button>
                        </div>
                    </div>

                    ${activeTab === 'metrics' ? `
                        <div class="space-y-16">
                            <div>
                                <h3 class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-8">Platform Revenue (Monetization)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

                                        <div class="space-y-8">
                                            ${state.cart.map(item => `
                                                <div class="flex justify-between items-center pb-6 border-b border-stone-200">
                                                    <div>
                                                        <h4 class="text-stone-900 font-bold text-xl mb-1">${item.name}</h4>
                                                        <p class="text-stone-500 text-sm">${item.qty} x Ksh ${formatNum(item.price)}</p>
                                                    </div>
                                                    <p class="text-stone-900 font-bold text-2xl">Ksh ${formatNum(item.qty * item.price)}</p>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                                
                                ${state.cart.length > 0 ? `
                                    <div class="pt-8 border-t border-stone-200">
                                        <h3 class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-8">Shipping Details</h3>
                                        <form id="checkoutForm" class="space-y-8">
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div>
                                                    <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-2">Full Name</label>
                                                    <input type="text" id="checkoutName" required>
                                                </div>
                                                <div>
                                                    <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-2">Phone Number</label>
                                                    <input type="text" id="checkoutPhone" required>
                                                </div>
                                            </div>
                                            <div class="pt-4">
                                                <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-6">Delivery Method</label>
                                                <div class="flex flex-col space-y-6">
                                                    <label class="flex items-center space-x-4 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="pickup" checked onchange="updateDeliveryFee()">
                                                        <span class="text-stone-900 text-lg">Pick-up Point (Free)</span>
                                                    </label>
                                                    <label class="flex items-center space-x-4 cursor-pointer">
                                                        <input type="radio" name="deliveryType" value="door" onchange="updateDeliveryFee()">
                                                        <span class="text-stone-900 text-lg">Door Delivery (+Ksh 1,000)</span>
                                                    </label>
                                                </div>
                                            </div>
                                            <div id="locationField" class="pt-4">
                                                <label class="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-2">Delivery Location / Pick-up Station</label>
                                                <input type="text" id="checkoutLocation">
                                            </div>
                                        </form>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="pl-0 lg:pl-16 lg:border-l border-stone-200">
                                <h3 class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-8">Order Summary</h3>
                                <div class="space-y-6 text-lg mb-10">
                                    <div class="flex justify-between text-stone-600"><span>Subtotal</span><span>Ksh ${formatNum(subtotal)}</span></div>
                                    <div class="flex justify-between text-stone-600"><span>Delivery Fee</span><span>Ksh ${formatNum(state.deliveryFee)}</span></div>
                                    <div class="flex justify-between text-stone-900 font-bold text-3xl pt-8 border-t border-stone-200 mt-8">
                                        <span>Total</span><span class="text-green-800">Ksh ${formatNum(total)}</span>
                                    </div>
                                </div>
                                <div class="space-y-8">
                                    <button onclick="checkout(event)" class="bg-stone-900 text-white w-full py-5 font-bold uppercase tracking-widest text-sm">Pay & Checkout</button>
                                    <button onclick="router.setSubView('farmer', 'market')" class="w-full text-stone-500 font-bold uppercase tracking-widest text-xs text-center">Continue Shopping</button>
                                </div>
                            </div>
                        </div>` : ''}

                    ${activeTab === 'orders' ? `
                        <div>
                            <h3 class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-10">Your Orders & Deliveries</h3>
                            <div class="space-y-16">
                                ${state.farmer.orders.map(o => `
                                    <div class="pb-12 border-b border-stone-200">
                                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10">
                                            <div>
                                                <h4 class="text-stone-900 font-bold text-3xl mb-3">${o.name}</h4>
                                                <p class="text-xs text-stone-500 uppercase tracking-widest">ID: <span class="font-bold text-stone-800">${o.id}</span> <span class="mx-3 text-stone-300">|</span> Placed: ${o.date}</p>
                                            </div>
                                            <div class="mt-6 md:mt-0 text-left md:text-right">
                                                <p class="text-stone-900 font-bold text-2xl">Ksh ${formatNum(o.total || 0)}</p>
                                                <p class="text-stone-500 text-sm mt-2">Qty: ${o.qty || 1}</p>
                                            </div>
                                        </div>
                                        
                                        ${getTrackingUI(o)}
                                        
                                        <div class="mt-10 pt-8 border-t border-stone-200 flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <p class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-4 md:mb-0">Status: <span class="text-stone-900 text-sm ml-3">${o.status}</span></p>
                                            ${o.status !== 'Delivered' ? `<p class="text-xs text-stone-500 uppercase tracking-widest">Est. Delivery: <span class="font-bold text-stone-900 ml-3 text-sm">${o.estDelivery}</span></p>` : `<p class="text-xs text-green-800 font-bold uppercase tracking-widest"><i class="fa-solid fa-check mr-2"></i>Order Complete</p>`}
                                        </div>
                                    </div>
                                `).join('')}
                                ${state.farmer.orders.length === 0 ? '<p class="text-stone-500 italic">No orders yet.</p>' : ''}
                            </div>
                        </div>` : ''}

                    ${activeTab === 'academy' ? renderAcademy() : ''}
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('app-root');
            root.innerHTML = ''; 
            switch(state.currentView) {
                case 'landing': root.innerHTML = renderLanding(); initTypewriter(); break;
                case 'admin': root.innerHTML = renderAdmin(); break;
                case 'producer': root.innerHTML = renderProducer(); break;
                case 'farmer': root.innerHTML = renderFarmer(); break;
                case 'processor': root.innerHTML = renderProcessor(); break;
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        let i = 0;
        const text = "Welcome to Waste to Wealth";
        function initTypewriter() {
            const elem = document.getElementById("typewriter");
            if(!elem) return;
            elem.innerHTML = "";
            i = 0;
            typeWriter();
        }

        function typeWriter() {
            const elem = document.getElementById("typewriter");
            if (elem && i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        window.addEventListener('load', () => { render(); });
    </script>
</body>
</html>
